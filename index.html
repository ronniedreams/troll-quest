<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TROLL QUEST — a platformer that hates you</title>
<meta name="description" content="40 levels of trap-filled platforming. Fake floors, lying signs, a boss with a crown. Works with keyboard, touch, or gamepad.">
<meta property="og:title" content="TROLL QUEST">
<meta property="og:description" content="A platformer that hates you. 40 levels, 40 betrayals.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='%237cff4f'/%3E%3Crect x='14' y='22' width='12' height='5' fill='%230b0820'/%3E%3Crect x='38' y='22' width='12' height='5' fill='%230b0820'/%3E%3Cpath d='M16 38 a16 10 0 0 0 32 0 z' fill='%230b0820'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0d0a1a;
    --panel:#171230;
    --ink:#e8e4ff;
    --dim:#8a83b8;
    --troll:#7cff4f;
    --danger:#ff3d6e;
    --gold:#ffd23f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    overscroll-behavior:none;
    background:var(--bg);
    color:var(--ink);
    font-family:"Courier New",ui-monospace,monospace;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;
    background-image:
      radial-gradient(circle at 20% 10%, #1a1440 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, #241040 0%, transparent 40%);
  }
  #wrap{position:relative;width:min(96vw,960px)}
  #hud{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:6px 4px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;
    font-size:clamp(10px,1.6vw,14px);
  }
  #hud .title{color:var(--troll);text-shadow:0 0 12px rgba(124,255,79,.5)}
  #hud .deaths{color:var(--danger)}
  #hud .level{color:var(--gold)}
  canvas{
    display:block;width:100%;height:auto;
    touch-action:none;
    background:#0b0820;
    border:3px solid #2b2158;
    border-radius:6px;
    image-rendering:pixelated;
    box-shadow:0 0 40px rgba(60,30,120,.35), inset 0 0 80px rgba(0,0,0,.5);
  }
  #toast{
    position:absolute;left:50%;top:14%;transform:translateX(-50%);
    background:var(--panel);border:2px solid var(--troll);color:var(--troll);
    padding:10px 18px;border-radius:8px;font-weight:bold;letter-spacing:1px;
    font-size:clamp(11px,1.8vw,16px);white-space:nowrap;
    opacity:0;pointer-events:none;transition:opacity .15s;
    text-shadow:0 0 8px rgba(124,255,79,.6);
    box-shadow:0 0 24px rgba(124,255,79,.25);
    z-index:5;
  }
  #toast.danger{border-color:var(--danger);color:var(--danger);
    text-shadow:0 0 8px rgba(255,61,110,.6);box-shadow:0 0 24px rgba(255,61,110,.25)}
  #toast.show{opacity:1}
  #help{
    margin-top:8px;color:var(--dim);font-size:clamp(10px,1.5vw,13px);
    letter-spacing:1px;text-align:center;
  }
  #touch{
    display:none;margin-top:10px;width:min(96vw,960px);
    justify-content:space-between;user-select:none;-webkit-user-select:none;
  }
  .tbtn{
    background:var(--panel);border:2px solid #3a2d78;color:var(--ink);
    border-radius:12px;font-size:26px;font-weight:bold;
    width:70px;height:64px;display:flex;align-items:center;justify-content:center;
    touch-action:none;
  }
  .tbtn:active{background:#2a2060}
  .tgroup{display:flex;gap:10px}
  .hbtns{display:flex;gap:6px}
  .hbtn{
    background:var(--panel);border:2px solid #3a2d78;color:var(--ink);
    border-radius:8px;width:34px;height:30px;font-size:15px;line-height:1;
    cursor:pointer;padding:0;
  }
  .hbtn:active{background:#2a2060}
  #rotate{
    display:none;position:fixed;left:0;right:0;bottom:0;z-index:20;
    background:var(--panel);color:var(--gold);text-align:center;
    padding:8px;font-weight:bold;letter-spacing:1px;font-size:13px;
    border-top:2px solid #3a2d78;
  }
  #touch{display:none !important}   /* replaced by touch zones on the canvas */
  @media (pointer:coarse){ #help{display:none} }
  @media (pointer:coarse) and (orientation:portrait){ #rotate{display:block} }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span class="title">TROLL QUEST</span>
    <span class="level" id="lvlLabel">LEVEL 1</span>
    <span class="deaths">DEATHS: <span id="deathCount">0</span></span>
    <span class="hbtns">
      <button class="hbtn" id="hbPause" title="Pause (P)">⏸</button>
      <button class="hbtn" id="hbLevels" title="Level select (L)">▦</button>
      <button class="hbtn" id="hbSound" title="Mute (M)">♪</button>
      <button class="hbtn" id="hbRestart" title="Restart (R)">↻</button>
    </span>
  </div>
  <canvas id="game" width="960" height="540"></canvas>
  <div id="toast"></div>
</div>
<div id="help">← → / A D to move &nbsp;·&nbsp; ↑ / W / SPACE to jump &nbsp;·&nbsp; R restart &nbsp;·&nbsp; P pause &nbsp;·&nbsp; L levels &nbsp;·&nbsp; M mute &nbsp;·&nbsp; 🎮 Ⓐ jump · Ⓧ levels · Ⓨ mute · START pause · SELECT restart</div>
<div id="rotate">↻ Rotate your phone — Troll Quest is best in landscape</div>
<div id="touch">
  <div class="tgroup">
    <div class="tbtn" id="btnL">◀</div>
    <div class="tbtn" id="btnR">▶</div>
  </div>
  <div class="tgroup">
    <div class="tbtn" id="btnJ">⤒</div>
  </div>
</div>

<script>
"use strict";
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
ctx.imageSmoothingEnabled = false;
const W = cvs.width, H = cvs.height;

// ---------- utils ----------
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const overlap = (a,b)=> a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
const rnd = a => a[Math.floor(Math.random()*a.length)];

// ---------- snark ----------
const DEATH_LINES = [
  "SKILL ISSUE.",
  "The floor was a lie.",
  "You trusted a platform? Cute.",
  "Physics called. It's laughing.",
  "That one's on you, honestly.",
  "Have you tried... not dying?",
  "The developer saw that. And smiled.",
  "Spikes: 1, You: still 0.",
  "Bold strategy. Didn't work.",
  "Gravity remains undefeated.",
  "Nice jump. Wrong direction.",
  "Free respawn! (You'll need it.)",
  "The troll toll has been paid.",
  "Muscle memory won't save you here.",
  "Sliced. Like an onion.",
  "Ice is slippery. Who knew?",
  "The platform dodged. You didn't.",
  "Teleported straight to regret.",
  "Darkness didn't kill you. You did.",
];
const TROLL_LINES = [
  "hehehe.",
  "you fell for it.",
  "classic.",
  "again? really?",
  "*points and laughs*",
];

// ---------- toast ----------
const toastEl = document.getElementById("toast");
let toastTimer = null;
function toast(msg, danger=false, ms=1600){
  toastEl.textContent = msg;
  toastEl.className = danger ? "danger show" : "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.className = danger?"danger":"", ms);
}

// ---------- audio ----------
// All sound is synthesized with the Web Audio API — no files.
// Browsers require a user gesture before audio starts, so we lazily
// create the context on the first keypress / tap.
let AC = null, soundOn = true, musicGain = null, mStep = 0, nextNoteT = 0, musicTimer = null;

function ensureAudio(){
  if(AC){
    if(AC.state === "suspended") AC.resume();
    return;
  }
  try{
    AC = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = AC.createGain();
    musicGain.gain.value = soundOn ? 0.5 : 0;
    musicGain.connect(AC.destination);
    nextNoteT = AC.currentTime + 0.1;
    musicTimer = setInterval(scheduleMusic, 60);
    toast("♪ Sound on — press M to mute.", false, 2200);
  }catch(e){ AC = null; }
}

// spooky-playful A-minor loop: 32 steps, null = rest
const MELODY = [0,null,3,null, 7,null,3,null, 8,7,null,3, 0,null,-2,null,
                0,null,3,null, 7,null,10,null, 12,null,10,8, 7,null,3,null];
const BASS   = [0,0,-4,-4, -7,-7,-5,-5, 0,0,-4,-4, -7,-7,-2,-2];

function noteAt(freq, t, dur, type, vol){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(musicGain);
  o.start(t); o.stop(t + dur);
}
function scheduleMusic(){
  if(!AC) return;
  const stepDur = 0.17;
  while(nextNoteT < AC.currentTime + 0.3){
    const s = mStep;
    const mel = MELODY[s % 32];
    if(mel !== null) noteAt(440 * Math.pow(2, mel/12), nextNoteT, 0.15, "square", 0.035);
    if(s % 2 === 0){
      const b = BASS[(s>>1) % 16];
      noteAt(110 * Math.pow(2, b/12), nextNoteT, 0.28, "triangle", 0.07);
    }
    mStep = (mStep + 1) % 32;
    nextNoteT += stepDur;
  }
}
function sfx(f0, f1, dur, type, vol){
  if(!AC || !soundOn) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(f1, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}
const jumpSfx  = ()=> sfx(300, 700, 0.13, "square", 0.10);
const deathSfx = ()=> sfx(300, 55, 0.35, "sawtooth", 0.09);
const winSfx   = ()=>{
  if(!AC || !soundOn) return;
  [0,4,7,12].forEach((n,i)=> noteAt(440*Math.pow(2,n/12), AC.currentTime + i*0.12, 0.25, "square", 0.06));
};
function toggleSound(){
  soundOn = !soundOn;
  if(musicGain) musicGain.gain.value = soundOn ? 0.5 : 0;
  toast(soundOn ? "♪ Sound on." : "Sound off. Suffer in silence.", !soundOn, 1400);
}
addEventListener("pointerdown", ensureAudio);

// ---------- touch-zone gameplay controls ----------
// Left half of the canvas steers (position picks a side, sliding the thumb
// overrides it like a virtual joystick). Right half is jump — hold works
// for swimming, jetpack thrust, and trampoline boosts.
const touchCtl = { moveId:null, jumpId:null, startX:0, left:false, right:false, jump:false };
const isCoarse = window.matchMedia && matchMedia("(pointer:coarse)").matches;

function clearTouchCtl(){
  touchCtl.moveId = touchCtl.jumpId = null;
  touchCtl.left = touchCtl.right = touchCtl.jump = false;
}
addEventListener("blur", clearTouchCtl);

// ---------- pause toggle (shared by key, gamepad, button, tap) ----------
function pauseToggle(){
  if(atTitle || gameWon || selecting) return;
  clearTouchCtl();
  paused = !paused;
  if(AC){ paused ? AC.suspend() : (soundOn && AC.resume()); }
  toast(paused ? "Paused. The traps are patient." : "Unpaused. They missed you.", false, 1200);
}
function openLevels(){
  if(atTitle) return;
  clearTouchCtl();
  selecting = !selecting;
  if(selecting){ selIdx = levelIdx; paused = false; if(AC && soundOn) AC.resume(); }
}

// ---------- input ----------
const keys = {};
addEventListener("keydown", e=>{
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," ","Spacebar"].includes(e.key)) e.preventDefault();
  ensureAudio();
  const k = e.key.toLowerCase();
  if(k==="m"){ toggleSound(); return; }

  // title screen
  if(atTitle){
    const saved2 = loadProgress();
    const hasSave = !!(saved2 && typeof saved2.u === "number");
    if((k==="arrowup"||k==="arrowdown"||k==="w"||k==="s") && hasSave){ titleSel = 1 - titleSel; return; }
    if(k==="n"){ startNewGame(); }
    else if(k==="c" && hasSave){ startContinue(saved2); }
    else if(k==="enter" || k===" "){
      (hasSave && titleSel===0) ? startContinue(saved2) : startNewGame();
    }
    return;
  }

  // pause
  if(k==="p"){ pauseToggle(); return; }
  // level select screen (works from pause too)
  if(k==="l"){
    selecting = !selecting;
    if(selecting){ selIdx = levelIdx; paused = false; if(AC && soundOn) AC.resume(); }
    return;
  }
  if(paused) return;
  if(selecting){
    if(k==="arrowleft")  selIdx = Math.max(0, selIdx-1);
    if(k==="arrowright") selIdx = Math.min(LEVELS.length-1, selIdx+1);
    if(k==="arrowup")    selIdx = Math.max(0, selIdx-10);
    if(k==="arrowdown")  selIdx = Math.min(LEVELS.length-1, selIdx+10);
    if(k==="enter"||k===" "){
      if(selIdx <= unlockedMax){ selecting = false; gameWon = false; loadLevel(selIdx); }
      else toast("Locked. Earn your suffering in order.", true, 1400);
    }
    if(k==="escape") selecting = false;
    if(k==="x"){
      wipeProgress(); selIdx = 0; selecting = false; gameWon = false;
      loadLevel(0);
      toast("Save wiped. A fresh canvas of pain.", true, 2000);
    }
    return;
  }

  keys[k] = true;
  if(k==="r") restartLevel(true);
});
addEventListener("keyup", e=> keys[e.key.toLowerCase()] = false);
function bindBtn(id, key){
  const el = document.getElementById(id);
  const on = e=>{e.preventDefault(); keys[key]=true;};
  const off= e=>{e.preventDefault(); keys[key]=false;};
  el.addEventListener("pointerdown",on);
  el.addEventListener("pointerup",off);
  el.addEventListener("pointerleave",off);
  el.addEventListener("pointercancel",off);
}
bindBtn("btnL","arrowleft"); bindBtn("btnR","arrowright"); bindBtn("btnJ"," ");

// HUD buttons (mouse + touch)
document.getElementById("hbPause").addEventListener("click", e=>{ e.preventDefault(); ensureAudio(); pauseToggle(); });
document.getElementById("hbLevels").addEventListener("click", e=>{ e.preventDefault(); ensureAudio(); openLevels(); });
document.getElementById("hbSound").addEventListener("click", e=>{ e.preventDefault(); ensureAudio(); toggleSound(); });
document.getElementById("hbRestart").addEventListener("click", e=>{
  e.preventDefault(); ensureAudio();
  if(atTitle) return;
  if(gameWon){ gameWon = false; loadLevel(levelIdx); }
  else restartLevel(true);
});

// canvas taps drive the menus (mobile has no keyboard)
cvs.addEventListener("pointerdown", e=>{
  const rect = cvs.getBoundingClientRect();
  const tx = (e.clientX - rect.left) * (W / rect.width);
  const ty = (e.clientY - rect.top) * (H / rect.height);

  if(atTitle){
    const saved2 = loadProgress();
    const hasSave = !!(saved2 && typeof saved2.u === "number");
    // option rows sit at y=350 and y=390 (24px text)
    if(hasSave && ty > 328 && ty < 366){ startContinue(saved2); return; }
    if(ty > 328+ (hasSave?40:0) && ty < 366 + (hasSave?40:0)){ startNewGame(); return; }
    // anywhere else: confirm the highlighted default
    (hasSave && titleSel===0) ? startContinue(saved2) : startNewGame();
    return;
  }
  if(selecting){
    const cols = 10, cw = 82, ch = 62, gx0 = (W - cols*cw)/2, gy0 = 100;
    const col = Math.floor((tx - gx0) / cw), row = Math.floor((ty - gy0) / ch);
    if(col>=0 && col<cols && row>=0 && ty>gy0){
      const i = row*cols + col;
      if(i < LEVELS.length){
        if(i <= unlockedMax){ selecting = false; gameWon = false; paused = false; loadLevel(i); }
        else toast("Locked. Earn your suffering in order.", true, 1400);
        return;
      }
    }
    selecting = false;   // tap outside the grid closes
    return;
  }
  if(paused){ pauseToggle(); return; }
  if(gameWon){ gameWon = false; loadLevel(levelIdx); return; }

  // ---- gameplay touch zones ----
  if(level.boomerang && ty < H*0.5){ throwBoomerang(); return; }
  if(tx < W*0.5){
    if(touchCtl.moveId === null){
      touchCtl.moveId = e.pointerId;
      touchCtl.startX = tx;
      // instant direction from position; sliding refines it
      touchCtl.left  = tx <  W*0.25;
      touchCtl.right = tx >= W*0.25;
    }
  } else {
    touchCtl.jumpId = e.pointerId;
    touchCtl.jump = true;
  }
});

cvs.addEventListener("pointermove", e=>{
  if(e.pointerId !== touchCtl.moveId) return;
  const rect = cvs.getBoundingClientRect();
  const tx = (e.clientX - rect.left) * (W / rect.width);
  const dx = tx - touchCtl.startX;
  if(dx < -14){ touchCtl.left = true;  touchCtl.right = false; }
  else if(dx > 14){ touchCtl.right = true; touchCtl.left = false; }
});

function touchRelease(e){
  if(e.pointerId === touchCtl.moveId){
    touchCtl.moveId = null;
    touchCtl.left = touchCtl.right = false;
  }
  if(e.pointerId === touchCtl.jumpId){
    touchCtl.jumpId = null;
    touchCtl.jump = false;
  }
}
cvs.addEventListener("pointerup", touchRelease);
cvs.addEventListener("pointercancel", touchRelease);
// ---------- gamepad ----------
const gp = { left:false, right:false, jump:false, connected:false, restartHeld:false };
addEventListener("gamepadconnected", e=>{
  gp.connected = true;
  toast("Gamepad connected: " + e.gamepad.id.slice(0,28) + " — it won't help.", false, 2200);
});
addEventListener("gamepaddisconnected", ()=>{
  gp.connected = false;
  gp.left = gp.right = gp.jump = false;
  toast("Gamepad disconnected. Ragequit via hardware?", true, 2000);
});
let gpBlocked = false, gpBlockNotified = false;
function pollGamepad(){
  if(gpBlocked) return;
  let pads = [];
  try {
    pads = navigator.getGamepads ? navigator.getGamepads() : [];
  } catch(err) {
    gpBlocked = true;
    if(!gpBlockNotified){
      gpBlockNotified = true;
      toast("Gamepad blocked in this preview — download the file & open it directly.", true, 4000);
    }
    return;
  }
  let pad = null;
  for(const p of pads){ if(p && p.connected){ pad = p; break; } }
  if(!pad){ gp.left = gp.right = gp.jump = false; return; }
  gp.connected = true;

  const now  = pad.buttons.map(b => !!(b && b.pressed));
  const prev = gp.prevButtons || [];
  const edge = i => now[i] && !prev[i];
  const ax = pad.axes[0] || 0, ay = pad.axes[1] || 0;
  const pax = gp.prevAx || 0, pay = gp.prevAy || 0;
  const DEAD = 0.35;

  // edge-triggered menu navigation (d-pad or stick flick)
  const navL = edge(14) || (ax < -0.5 && pax >= -0.5);
  const navR = edge(15) || (ax >  0.5 && pax <=  0.5);
  const navU = edge(12) || (ay < -0.5 && pay >= -0.5);
  const navD = edge(13) || (ay >  0.5 && pay <=  0.5);
  const A = edge(0), B = edge(1), X = edge(2), Y = edge(3);
  const START = edge(9), SELECT = edge(8);

  if(A||B||X||Y||START||SELECT||navL||navR||navU||navD) ensureAudio();

  if(atTitle){
    const saved2 = loadProgress();
    const hasSave = !!(saved2 && typeof saved2.u === "number");
    if((navU || navD) && hasSave) titleSel = 1 - titleSel;
    if(A || START){
      if(hasSave && titleSel === 0) startContinue(saved2);
      else startNewGame();
    }
  } else if(selecting){
    if(navL) selIdx = Math.max(0, selIdx-1);
    if(navR) selIdx = Math.min(LEVELS.length-1, selIdx+1);
    if(navU) selIdx = Math.max(0, selIdx-10);
    if(navD) selIdx = Math.min(LEVELS.length-1, selIdx+10);
    if(A){
      if(selIdx <= unlockedMax){ selecting = false; gameWon = false; paused = false; loadLevel(selIdx); }
      else toast("Locked. Earn your suffering in order.", true, 1400);
    }
    if(B || X) selecting = false;
  } else if(gameWon){
    if(A || SELECT){ gameWon = false; loadLevel(levelIdx); }
    if(X){ selecting = true; selIdx = levelIdx; }
  } else if(paused){
    if(A || START){ paused = false; if(AC && soundOn) AC.resume(); }
    if(X){ paused = false; if(AC && soundOn) AC.resume(); selecting = true; selIdx = levelIdx; }
    if(Y) toggleSound();
  } else {
    if(START){ paused = true; if(AC) AC.suspend(); }
    if(SELECT) restartLevel(true);
    if(X){ selecting = true; selIdx = levelIdx; }
    if(Y) toggleSound();
    if(B && level && level.boomerang) throwBoomerang();
  }

  // gameplay movement
  gp.left  = ax < -DEAD || now[14];
  gp.right = ax >  DEAD || now[15];
  const bIsJump = !(level && level.boomerang);   // B becomes the boomerang on boss levels
  gp.jump  = now[0] || (bIsJump && now[1]) || now[12] || (ay < -0.6);

  gp.prevButtons = now;
  gp.prevAx = ax; gp.prevAy = ay;
}

const inLeft  = ()=> keys["arrowleft"]||keys["a"]||gp.left||touchCtl.left;
const inRight = ()=> keys["arrowright"]||keys["d"]||gp.right||touchCtl.right;
const inJump  = ()=> keys["arrowup"]||keys["w"]||keys[" "]||keys["spacebar"]||gp.jump||touchCtl.jump;

// ---------- player ----------
const P = {
  x:0,y:0,w:26,h:30,vx:0,vy:0,
  onGround:false, face:1, coyote:0, jumpHeld:false,
  gravDir:1, dead:false, deadT:0, winT:0,
  reversed:false, onIce:false,
  jumpPow:11.2, conv:0, size:'normal',
  onGlue:false, flash:0, fuel:0, wallDir:0,
  sx:1, sy:1, prevOn:false,
  boostT:0, boostVx:0,
};

let echoRec = [], echoPath = null, echoT = 0;
let brng = null;   // the one active boomerang

function throwBoomerang(){
  if(!level || !level.boomerang || brng || P.dead || paused || selecting || atTitle || gameWon) return;
  brng = {x: P.x + P.w/2, y: P.y + P.h/2 - 2, vx: P.face * 9.5, state:'out', hit:false, t:0};
  sfx(500, 900, 0.12, "square", 0.07);
}

// ---------- visual themes (per level, mobile-friendly: prerendered) ----------
const THEMES = {
  violet:  {bg1:"#0d0a1a", bg2:"#1a1440", plat:"#3a2d78", platTop:"#5a48b8", sil:"#16112e", amb:"motes"},

  rust:    {bg1:"#140d0a", bg2:"#2a1810", plat:"#5a3a2a", platTop:"#8a5f3a", sil:"#1f130c", amb:"motes"},
  ember:   {bg1:"#180808", bg2:"#401010", plat:"#5a2a20", platTop:"#8a4530", sil:"#2a0d0a", amb:"embers"},
  frost:   {bg1:"#0a1018", bg2:"#102030", plat:"#2a4a6a", platTop:"#4a7aa8", sil:"#0e1a28", amb:"snow"},
  aqua:    {bg1:"#08141a", bg2:"#0e2c38", plat:"#1f5a5a", platTop:"#3a8a8a", sil:"#0c2028", amb:"bubbles"},
  midnight:{bg1:"#07060f", bg2:"#0e0c20", plat:"#2a2450", platTop:"#443a80", sil:"#0b0918", amb:"motes"},
  throne:  {bg1:"#0c120a", bg2:"#1a2a10", plat:"#3a4a20", platTop:"#6a7a30", sil:"#131f0c", amb:"embers"},
};
function themeFor(src, i){
  const types = new Set(src.objs.map(o=>o.t));
  if(src.lava) return THEMES.ember;
  if(types.has('boss')) return THEMES.throne;
  if(types.has('water')) return THEMES.aqua;
  if(types.has('ice')) return THEMES.frost;
  if(types.has('wind')) return THEMES.moss;
  if(src.dark) return THEMES.midnight;
  return [THEMES.violet, THEMES.dusk, THEMES.moss, THEMES.rust][i % 4];
}

// deterministic PRNG so each level's sky is stable
function lcg(seed){ let s=seed>>>0; return ()=>((s = (s*1664525+1013904223)>>>0) / 4294967296); }

let bgFar=null, bgMid=null, fxOverlay=null, fxRed=null;
var lowFX = false;
let ambient=[]; let bannerT=0, bannerText=""; let redFlash=0;

function buildBackdrop(){
  const th = level.theme, r = lcg(levelIdx*7919+13);
  bgFar = document.createElement('canvas'); bgFar.width=W; bgFar.height=H;
  let c = bgFar.getContext('2d');
  const g = c.createLinearGradient(0,0,0,H);
  g.addColorStop(0, th.bg1); g.addColorStop(1, th.bg2);
  c.fillStyle = g; c.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<80;i++){
    c.globalAlpha = 0.15 + r()*0.55;
    c.fillStyle = "#e8e4ff";
    const s = r()<0.85 ? 1.5 : 2.5;
    c.fillRect(r()*W, r()*H*0.72, s, s);
  }
  c.globalAlpha = 1;
  // moon
  const mx = 120 + r()*(W-260), my = 60 + r()*60;
  c.fillStyle = "rgba(232,228,255,0.14)";
  c.beginPath(); c.arc(mx,my,44,0,Math.PI*2); c.fill();
  c.fillStyle = "#cfc8e8";
  c.beginPath(); c.arc(mx,my,30,0,Math.PI*2); c.fill();
  c.fillStyle = "rgba(0,0,0,0.15)";
  c.beginPath(); c.arc(mx-9,my+5,7,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(mx+11,my-8,5,0,Math.PI*2); c.fill();

  // parallax skyline (wider than screen)
  bgMid = document.createElement('canvas'); bgMid.width=W+260; bgMid.height=H;
  c = bgMid.getContext('2d');
  c.fillStyle = th.sil;
  let x = 0;
  while(x < W+260){
    const bw = 50 + r()*110;
    const bh = 90 + r()*230;
    c.fillRect(x, H-bh, bw, bh);
    if(r()<0.5) c.fillRect(x+bw*0.3, H-bh-14, bw*0.28, 14); // rooftop bump
    x += bw + 8 + r()*40;
  }
  // faint windows
  c.fillStyle = "rgba(255,210,63,0.10)";
  for(let i=0;i<60;i++) c.fillRect(20+r()*(W+220), H-40-r()*220, 4, 6);

  // ambient particle seed
  ambient = [];
  const kind = th.amb;
  const n = kind==="bubbles" ? 14 : 22;
  for(let i=0;i<n;i++){
    ambient.push({x:Math.random()*W, y:Math.random()*H, k:kind,
      v:0.2+Math.random()*0.7, ph:Math.random()*6.28, s:1.5+Math.random()*2.5});
  }
}

let darkSprite = null;
const DARK_S = 430;
function buildDarkSprite(){
  darkSprite = document.createElement('canvas');
  darkSprite.width = darkSprite.height = DARK_S;
  const c = darkSprite.getContext('2d');
  const g = c.createRadialGradient(DARK_S/2, DARK_S/2, 70, DARK_S/2, DARK_S/2, 175);
  g.addColorStop(0, "rgba(6,4,16,0)");
  g.addColorStop(1, "rgba(6,4,16,0.94)");
  c.fillStyle = g;
  c.fillRect(0, 0, DARK_S, DARK_S);
}
buildDarkSprite();

function buildFX(){
  fxOverlay = document.createElement('canvas'); fxOverlay.width=W; fxOverlay.height=H;
  let c = fxOverlay.getContext('2d');
  // scanlines
  c.fillStyle = "rgba(0,0,0,0.05)";
  for(let y=0;y<H;y+=3) c.fillRect(0,y,W,1);
  // vignette
  const v = c.createRadialGradient(W/2,H/2,H*0.42, W/2,H/2,H*0.85);
  v.addColorStop(0,"rgba(0,0,0,0)");
  v.addColorStop(1,"rgba(0,0,0,0.34)");
  c.fillStyle = v; c.fillRect(0,0,W,H);

  fxRed = document.createElement('canvas'); fxRed.width=W; fxRed.height=H;
  c = fxRed.getContext('2d');
  const rg = c.createRadialGradient(W/2,H/2,H*0.30, W/2,H/2,H*0.80);
  rg.addColorStop(0,"rgba(255,30,70,0)");
  rg.addColorStop(1,"rgba(255,30,70,0.55)");
  c.fillStyle = rg; c.fillRect(0,0,W,H);
}
buildFX();

// soft glow sprites (cached; drawn with 'lighter' so they read as light)
const glowCache = {};
function glowSprite(color){
  if(glowCache[color]) return glowCache[color];
  const c = document.createElement('canvas'); c.width=c.height=64;
  const g = c.getContext('2d');
  const rg = g.createRadialGradient(32,32,2,32,32,30);
  rg.addColorStop(0,color); rg.addColorStop(1,"rgba(0,0,0,0)");
  g.fillStyle = rg; g.fillRect(0,0,64,64);
  glowCache[color] = c; return c;
}
function drawGlow(x,y,size,color,alpha,force){
  if(lowFX && !force) return;   // glows are the priciest decoration (composite switch)
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.globalCompositeOperation = "lighter";
  ctx.drawImage(glowSprite(color), x-size/2, y-size/2, size, size);
  ctx.restore();
}

function setSize(mode){
  if(P.size === mode) return;
  const oldW = P.w, oldH = P.h;
  if(mode==='small'){ P.w=14; P.h=16; P.jumpPow=8.0; }
  else { P.w=26; P.h=30; P.jumpPow=11.2; }
  P.size = mode;
  P.y += (oldH - P.h);          // keep feet planted
  P.x += (oldW - P.w)/2;
  shake = Math.max(shake,3);
}
