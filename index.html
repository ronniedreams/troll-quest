let levelIdx = 0;
let level = null;
let flagHopCount = 0;
let gameWon = false;
let winTimer = 0;
let shake = 0;
let particles = [];
let teleCool = 0;
let frame = 0;

// ---------- save system ----------
// Uses localStorage when available (works when the file is opened directly).
// Sandboxed previews block storage, so we fall back to in-memory for the session.
const SAVE_KEY = "trollquest_save_v2";
let unlockedMax = 0;
let memSave = null;
let storageOK = true;

let saveCache;   // in-memory mirror — storage is touched only on boot & writes
function saveProgress(){
  saveCache = {u:unlockedMax, d:deaths};
  const data = JSON.stringify(saveCache);
  memSave = data;
  if(!storageOK) return;
  try { localStorage.setItem(SAVE_KEY, data); }
  catch(e){ storageOK = false; }
}
function loadProgress(){
  if(saveCache !== undefined) return saveCache;   // cached after first read
  let raw = null;
  try { raw = localStorage.getItem(SAVE_KEY); }
  catch(e){ storageOK = false; raw = memSave; }
  if(!raw){ saveCache = null; return null; }
  try { saveCache = JSON.parse(raw); } catch(e){ saveCache = null; }
  return saveCache;
}
function wipeProgress(){
  unlockedMax = 0; deaths = 0; deathEl.textContent = 0;
  memSave = null; saveCache = null;
  try { localStorage.removeItem(SAVE_KEY); } catch(e){}
}

// ---------- level select ----------
let selecting = false;
let selIdx = 0;
let trollFace = {t:0,msg:""};

function loadLevel(i){
  levelIdx = i;
  const src = LEVELS[i];
  level = {
    name: src.name,
    spawn: src.spawn,
    dark: !!src.dark,
    grav: src.grav,
    autorun: !!src.autorun,
    twin: !!src.twin,
    invis: !!src.invis,
    mirror: !!src.mirror,
    wrap: !!src.wrap,
    walljump: !!src.walljump,
    echo: !!src.echo,
    flipud: !!src.flipud,
    boomerang: !!src.boomerang,
    checkpoint: null,
    chan: {},
    lantern: null,
    lava: src.lava ? {y:560, spd:src.lava.spd} : null,
    objs: src.objs.map(o => Object.assign({}, o, {st:{
      crumbleT:-1, gone:false,        // crumble
      seen:false,                     // ghost
      popped:false, popY:0,           // popspike
      falling:false, fy:o.y, landed:false, // fallspike
      exploded:false,                 // fakeflag
      dir:1,                          // saw
      sliding:false, slid:false,      // dodge
      revealed:false,                 // fakespikes
      cx:o.x, cy:o.y, grace:60, mode:'drift', mt:0, dvx:0, dvy:0, trail:[], // chaser
      kx:o.x, held:false,             // key
      open:false,                     // door
      taken:false,                    // fuelcan
      squashed:false,                 // walker
      bx:o.x, by:o.y, bvx:0, bvy:0, hp:o.hp||3, hurtT:0, rest:50, deadB:false, crouch:0, slam:false, lastWasSlam:false, // boss
      lit:false,                      // checkpoints
      on:false,                       // button
      fuse:-1, boom:0, doneB:false,   // bomb
    }})),
  };
  for(const o of level.objs){ o.hx = o.x; o.hy = o.y; } // home positions
  level.lantern = level.objs.find(o=>o.t==='lantern') || null;
  bullets = [];
  waves = [];
  echoRec = []; echoPath = null; echoT = 0;
  brng = null;
  level.theme = themeFor(src, i);
  buildBackdrop();
  bannerT = 95; bannerText = "LEVEL " + (i+1) + " — " + src.name;
  flagHopCount = 0;
  respawn();
  lvlEl.textContent = "LEVEL " + (i+1) + "/" + LEVELS.length;
  toast("LVL " + (i+1) + ": " + src.name + " — " + src.intro, false, 2600);
}

function respawn(){
  const sp = level.checkpoint || level.spawn;
  P.x = sp.x; P.y = sp.y;
  P.vx = 0; P.vy = 0; P.gravDir = 1; P.reversed = false;
  P.dead = false; P.deadT = 0; P.onGround = false;
  P.conv = 0;
  P.flash = 45;
  P.fuel = 0; P.wallDir = 0;
  P.boostT = 0;
  levelTime = 0;
  waves = [];
  echoRec = []; echoT = 0;
  brng = null;   // brief visibility grace on invisible levels
  bullets = [];
  toggleOn = true;
  setSize('normal');
  if(level.lava) level.lava.y = 560;
  // reset dynamic traps (the trolls re-arm — of course they do)
  for(const o of level.objs){
    o.st.crumbleT = -1; o.st.gone = false;
    o.st.falling = false; o.st.fy = o.y; o.st.landed = false;
    o.st.popped = false;
    if(o.t==='dodge'||o.t==='saw'){ o.x = o.hx; o.st.slid=false; o.st.sliding=false; o.st.dir=1; }
    if(o.t==='chaser'){ o.st.cx = o.hx; o.st.cy = o.hy; o.st.grace = 60; o.st.mode='drift'; o.st.mt=0; o.st.trail=[]; }
    if(o.t==='mover'){ o.x = o.hx; o.y = o.hy; o.st.dir = 1; }
    if(o.t==='walker'){ o.x = o.hx; o.st.dir = 1; o.st.squashed = false; }
    if(o.t==='fuelcan') o.st.taken = false;
    if(o.t==='bomb'){ o.st.fuse = -1; o.st.boom = 0; o.st.doneB = false; }
    if(o.t==='lantern'){ o.x = o.hx; o.st.dir = 1; }
    if(o.t==='boss' && !o.st.deadB){
      o.st.bx = o.hx; o.st.by = o.hy; o.st.bvx = 0; o.st.bvy = 0;
      if(!o.persist) o.st.hp = o.hp || 3;   // the rematch king remembers his wounds
      o.st.hurtT = 0; o.st.rest = 50;
      o.st.crouch = 0; o.st.slam = false; o.st.lastWasSlam = false;
    }
    // ghost stays seen, fakeflag exploded, fakespikes revealed, key stays caught — small mercies
  }
}

function restartLevel(rage){
  if(gameWon) return;
  loadLevel(levelIdx);
  if(rage) toast("Rage restart. Understandable.", true, 1400);
}

function die(reason){
  if(P.dead || gameWon) return;
  P.dead = true; P.deadT = 0;
  deaths++; deathEl.textContent = deaths;
  if(level.echo && echoRec.length > 10) echoPath = echoRec.slice();
  saveProgress();
  deathSfx();
  redFlash = 12;
  shake = 14;
  trollFace = {t:90, msg:rnd(TROLL_LINES)};
  for(let i=0;i<26;i++){
    particles.push({
      x:P.x+P.w/2, y:P.y+P.h/2,
      vx:(Math.random()-0.5)*9, vy:(Math.random()-0.9)*9,
      life:40+Math.random()*20, c:Math.random()<0.5?"#ff3d6e":"#ffd23f", s:3+Math.random()*4
    });
  }
  toast(reason || rnd(DEATH_LINES), true, 1500);
}

function win(){
  gameWon = true; winTimer = 0;
  winSfx();
  unlockedMax = Math.max(unlockedMax, LEVELS.length-1);
  saveProgress();
  toast("YOU... WON? The troll respects you. Barely.", false, 4000);
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*W, y:-10,
      vx:(Math.random()-0.5)*2, vy:1+Math.random()*3,
      life:200+Math.random()*100, c:rnd(["#7cff4f","#ffd23f","#ff3d6e","#5fd7ff"]), s:3+Math.random()*5
    });
  }
}

// ---------- physics ----------
function step(){
  if(gameWon){ winTimer++; return; }

  if(P.dead){
    P.deadT++;
    if(P.deadT > 45) respawn();
    return;
  }
  if(teleCool>0) teleCool--;
  gframe++;
  levelTime++;

  // rising lava
  if(level.lava){
    level.lava.y -= level.lava.spd;
    if(P.y + P.h > level.lava.y) return die("Extra crispy.");
  }

  // zones
  let rev=false, flip=false, windFx=0, magX=0, magY=0;
  const body = {x:P.x,y:P.y,w:P.w,h:P.h};
  for(const o of level.objs){
    if(o.t==='revzone' && overlap(body,o)) rev=true;
    if(o.t==='gravzone' && overlap(body,o)) flip=true;
    if(o.t==='wind' && overlap(body,o)) windFx += o.fx;
    if(o.t==='magnet'){
      const dx = o.x - (P.x+P.w/2), dy = o.y - (P.y+P.h/2);
      const d = Math.hypot(dx,dy);
      if(d < o.rad && d > 4){
        const f = o.pull * (1 - d/o.rad);
        magX += dx/d * f;
        magY += dy/d * f;
      }
    }
  }
  let inWater = false;
  for(const o of level.objs){
    if(o.t==='water' && overlap(body,o)){ inWater = true; break; }
  }

  // moving platforms: advance and carry riders
  for(const o of level.objs){
    if(o.t==='orbiter'){
      const ang = gframe * o.ospd + (o.ph||0);
      const nx = o.ox + Math.cos(ang)*o.orad - o.w/2;
      const ny = o.oy + Math.sin(ang)*o.orad - o.h/2;
      const riding = P.gravDir===1 && Math.abs((P.y+P.h) - o.y) < 5 &&
                     P.x+P.w > o.x && P.x < o.x+o.w;
      const dx2 = nx - o.x, dy2 = ny - o.y;
      o.x = nx; o.y = ny;
      if(riding){ P.x += dx2; P.y += dy2; }
      continue;
    }
    if(o.t!=='mover') continue;
    const vert = o.axis==='y';
    const cur = vert ? o.y : o.x;
    let next = cur + o.st.dir * o.spd;
    const lo = Math.min(o.a,o.b), hi = Math.max(o.a,o.b);
    if(next < lo){ next = lo; o.st.dir = 1; }
    if(next > hi){ next = hi; o.st.dir = -1; }
    const d = next - cur;
    const riding = P.gravDir===1 && Math.abs((P.y+P.h) - o.y) < 5 &&
                   P.x+P.w > o.x && P.x < o.x+o.w;
    if(vert){ o.y = next; if(riding) P.y += d; }
    else    { o.x = next; if(riding) P.x += d; }
  }
  if(rev !== P.reversed){
    P.reversed = rev;
    if(rev) toast("Controls feel... off? Weird.", true, 1200);
  }
  const newGrav = flip ? -1 : 1;
  if(newGrav !== P.gravDir){
    P.gravDir = newGrav;
    P.vy = 0;
    toast(flip ? "Gravity said no." : "Gravity restored. You're welcome.", true, 1200);
  }

  // move
  let L = inLeft(), R = inRight();
  if(level.autorun){ L = false; R = true; }
  if(P.reversed){ const t=L; L=R; R=t; }
  if(P.boostT > 0){
    // booster pad: steering disabled, velocity locked
    P.boostT--;
    P.vx = P.boostVx;
    P.face = Math.sign(P.boostVx) || 1;
  } else {
    const acc = P.onIce ? MOVE*0.35 : (P.onGlue ? MOVE*0.6 : MOVE);
    if(L){ P.vx -= acc; P.face=-1; }
    if(R){ P.vx += acc; P.face=1; }
    if(!L && !R) P.vx *= (P.onIce ? 0.99 : (P.onGlue ? 0.5 : FRICTION));
    P.vx += windFx + magX;
    P.vx = clamp(P.vx, -MAXVX, MAXVX);
    if(P.onGlue) P.vx = clamp(P.vx, -1.7, 1.7);
  }

  // jump w/ coyote time (or swimming)
  if(inWater){
    P.vy += 0.14 * P.gravDir;                 // gentle sink
    if(inJump()) P.vy -= 0.5 * P.gravDir;     // hold to swim up
    P.vy *= 0.96;
    P.vy = clamp(P.vy, -3.6, 3.6);
    P.coyote = 0;
    P.jumpHeld = inJump();
  } else {
  // wall slide + wall jump
  if(level.walljump && !P.onGround && P.wallDir && P.vy * P.gravDir > 0){
    if(P.gravDir===1 && P.vy > 1.8) P.vy = 1.8;
    if(P.gravDir===-1 && P.vy < -1.8) P.vy = -1.8;
    if(inJump() && !P.jumpHeld){
      P.vy = -10.6 * P.gravDir;
      P.vx = -P.wallDir * 6.2;
      P.jumpHeld = true; P.flash = 16;
      P.sx = 0.72; P.sy = 1.32;
      jumpSfx();
      toggleOn = !toggleOn;
    }
  }
  if(P.onGround) P.coyote = 7; else if(P.coyote>0) P.coyote--;
  if(inJump() && !P.jumpHeld && P.coyote>0){
    P.vy = -P.jumpPow * P.gravDir;
    P.coyote = 0;
    P.jumpHeld = true;
    P.sx = 0.72; P.sy = 1.32;
    P.flash = 16;           // invisible levels: jumping reveals you
    jumpSfx();
    toggleOn = !toggleOn;   // flip-flop blocks swap on every jump
  }
  if(!inJump()) P.jumpHeld = false;
  }
  if(P.flash>0) P.flash--;

  // jetpack thrust
  if(P.fuel > 0 && inJump() && !P.onGround && !inWater){
    P.vy -= 0.85 * P.gravDir;
    P.fuel--;
    if(frame % 3 === 0) particles.push({
      x:P.x+P.w/2, y:P.gravDir===1 ? P.y+P.h : P.y,
      vx:(Math.random()-0.5)*1.5, vy:2.5*P.gravDir + Math.random(),
      life:14+Math.random()*8, c:Math.random()<0.5?"#ff9d3f":"#ffd23f", s:3
    });
  }

  if(!inWater) P.vy += (level.grav || GRAV) * P.gravDir;
  P.vy += magY * 1.6;
  if(P.gravDir===1) P.vy = clamp(P.vy, -26, MAXFALL);
  else P.vy = clamp(P.vy, -MAXFALL, 26);

  // collide X
  P.x += P.vx;
  P.wallDir = 0;
  for(const o of level.objs){
    if(!isSolid(o)) continue;
    const r = solidRect(o);
    if(overlap({x:P.x,y:P.y,w:P.w,h:P.h}, r)){
      if(o.t==='ghost' && !o.st.seen) revealGhost(o);
      const v0 = P.vx;
      if(P.vx>0){ P.x = r.x - P.w; P.wallDir = 1; }
      else if(P.vx<0){ P.x = r.x + r.w; P.wallDir = -1; }
      if(o.t==='rubber' && Math.abs(v0) > 0.5){
        P.vx = -Math.sign(v0) * clamp(Math.abs(v0)*1.35, 5, 12);
        P.boostT = 14;          // ricochet carries — briefly uncontrollable, like real pinball
        P.boostVx = P.vx;
        shake = Math.max(shake, 3);
        sfx(200, 500, 0.1, "square", 0.06);
      } else {
        P.vx = 0;
      }
    }
  }
  if(level.wrap){
    if(P.x + P.w/2 > W) P.x -= W;
    else if(P.x + P.w/2 < 0) P.x += W;
  } else {
    P.x = clamp(P.x, 0, W-P.w);
  }

  // collide Y
  P.y += P.vy;
  P.onGround = false;
  P.onIce = false;
  P.onGlue = false;
  P.conv = 0;
  for(const o of level.objs){
    if(!isSolid(o) && o.t!=='oneway') continue;
    const r = solidRect(o);
    if(overlap({x:P.x,y:P.y,w:P.w,h:P.h}, r)){
      if(o.t==='ghost' && !o.st.seen) revealGhost(o);
      if(o.t==='oneway'){
        const fromAbove = P.gravDir===1 && P.vy > 0 && (P.y + P.h - P.vy) <= r.y + 4;
        if(!fromAbove) continue;
      }
      if(P.vy * P.gravDir > 0){
        // landing
        if(P.gravDir===1) P.y = r.y - P.h; else P.y = r.y + r.h;
        if(o.t==='bounce'){
          P.vy = -((o.power||16) + (inJump() ? 4 : 0)) * P.gravDir;
          P.sx = 0.7; P.sy = 1.35;
          shake = Math.max(shake,4);
          continue;
        }
        P.onGround = true;
        if(o.t==='ice') P.onIce = true;
        if(o.t==='conveyor') P.conv = o.cvx;
        if(o.t==='glue') P.onGlue = true;
        if(o.t==='crumble' && o.st.crumbleT<0){ o.st.crumbleT = 22; }
      } else {
        // bonk
        if(P.gravDir===1) P.y = r.y + r.h; else P.y = r.y - P.h;
      }
      P.vy = 0;
    }
  }

  // landing squash + dust
  if(P.onGround && !P.prevOn){
    P.sx = 1.32; P.sy = 0.68;
    for(let i=0;i<3;i++) particles.push({
      x: P.x + P.w/2 + (Math.random()-0.5)*P.w,
      y: P.gravDir===1 ? P.y+P.h : P.y,
      vx: (Math.random()-0.5)*2.2, vy: -Math.random()*1.2*P.gravDir,
      life: 12+Math.random()*8, c: "rgba(200,190,230,0.7)", s: 2.5
    });
  }
  P.prevOn = P.onGround;
  P.sx += (1 - P.sx) * 0.18;
  P.sy += (1 - P.sy) * 0.18;

  // conveyor carry
  if(P.conv) P.x = clamp(P.x + P.conv, 0, W-P.w);

  // fell off the world
  if(P.y > H+60 || P.y < -80) die("The void sends its regards.");

  // ---------- trap logic ----------
  const pb = {x:P.x,y:P.y,w:P.w,h:P.h};
  for(const o of level.objs){
    switch(o.t){
      case 'crumble':
        if(o.st.crumbleT>0){
          o.st.crumbleT--;
          if(o.st.crumbleT===0){ o.st.gone = true; shake = Math.max(shake,4); }
        }
        break;
      case 'spikes':
        if(overlap(pb,o)) die();
        break;
      case 'popspike':
        if(!o.st.popped && overlap(pb, o.trig)){
          o.st.popped = true; o.st.popY = 0; shake = Math.max(shake,5);
        }
        if(o.st.popped){
          if(o.st.popY < o.h) o.st.popY += 4;
          const r = {x:o.x, y:o.y + o.h - o.st.popY, w:o.w, h:o.st.popY};
          if(o.st.popY>4 && overlap(pb, r)) die("Surprise! It's spikes.");
        }
        break;
      case 'fallspike': {
        if(!o.st.falling && !o.st.landed){
          const below = P.x+P.w > o.x-6 && P.x < o.x+o.w+6 && P.y > o.y;
          if(below) o.st.falling = true;
        }
        if(o.st.falling){
          o.st.fy += 9;
          if(o.st.fy > H-40-o.h){ o.st.fy = H-40-o.h; o.st.falling=false; o.st.landed=true; shake=Math.max(shake,3); }
        }
        const r = {x:o.x+6, y:o.st.fy, w:o.w-12, h:o.h};
        if(overlap(pb,r)) die("Ceiling check failed.");
        break;
      }
      case 'fakeflag':
        if(!o.st.exploded && overlap(pb,o)){
          o.st.exploded = true;
          die("That flag was a paid actor.");
        }
        if(o.st.exploded && overlap(pb,o)) die();
        break;
      case 'saw': {
        o.x += o.st.dir * (o.spd||3);
        if(o.x < o.x1){ o.x = o.x1; o.st.dir = 1; }
        if(o.x + o.w > o.x2){ o.x = o.x2 - o.w; o.st.dir = -1; }
        const r = {x:o.x+5, y:o.y+5, w:o.w-10, h:o.h-10};
        if(overlap(pb,r)) die("Sliced. Diced. Respawned.");
        break;
      }
      case 'dodge': {
        if(!o.st.slid && !o.st.sliding){
          const approaching = !P.onGround &&
            Math.abs((P.x+P.w/2)-(o.x+o.w/2)) < 140 &&
            P.y + P.h < o.y + 10;
          if(approaching){
            o.st.sliding = true;
            toast(rnd(["The platform said nope.","It has commitment issues.","Platform.exe has left."]), true, 1200);
          }
        }
        if(o.st.sliding){
          const dir = Math.sign(o.slideTo - o.x) || 1;
          o.x += dir * 7;
          if((dir>0 && o.x>=o.slideTo)||(dir<0 && o.x<=o.slideTo)){
            o.x = o.slideTo; o.st.sliding = false; o.st.slid = true;
          }
        }
        break;
      }
      case 'fakespikes':
        if(!o.st.revealed && overlap(pb,o)){
          o.st.revealed = true;
          toast("Rubber spikes. They squeak.", false, 1600);
        }
        break;
      case 'button':
        if(!o.st.on && overlap(pb,o)){
          o.st.on = true;
          level.chan[o.ch] = true;
          sfx(600, 300, 0.1, "square", 0.07);
          shake = Math.max(shake,3);
          toast(o.msg || "Click.", o.ch===2, 1800);
        }
        break;
      case 'booster':
        if(overlap(pb,o)){
          if(P.boostT <= 0) sfx(220, 800, 0.18, "sawtooth", 0.07);
          P.boostT = 26;
          P.boostVx = o.bvx;
        }
        break;
      case 'bomb': {
        const s = o.st;
        if(s.doneB) break;
        const bcx = o.x+o.w/2, bcy = o.y+o.h/2;
        const d = Math.hypot((P.x+P.w/2)-bcx, (P.y+P.h/2)-bcy);
        if(s.fuse < 0 && d < 90){
          s.fuse = 100;
          sfx(900, 700, 0.08, "square", 0.06);
        }
        if(s.fuse > 0){
          s.fuse--;
          if(s.fuse % (s.fuse > 40 ? 20 : 8) === 0) sfx(1000, 900, 0.05, "square", 0.05);
          if(s.fuse === 0){
            s.boom = 12;
            shake = Math.max(shake, 10);
            sfx(300, 40, 0.4, "sawtooth", 0.13);
            for(let i=0;i<20;i++) particles.push({
              x:bcx, y:bcy, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.8)*9,
              life:30+Math.random()*20, c:rnd(["#ff9d3f","#ffd23f","#ff3d6e"]), s:3+Math.random()*4
            });
          }
        }
        if(s.boom > 0){
          s.boom--;
          if(d < o.r) die("Boom. Obviously.");
          if(s.boom === 0) s.doneB = true;
        }
        break;
      }
      case 'lantern':
        o.x += o.st.dir * o.spd;
        if(o.x < o.a){ o.x = o.a; o.st.dir = 1; }
        if(o.x > o.b){ o.x = o.b; o.st.dir = -1; }
        break;
      case 'portal':
        if(teleCool<=0 && overlap(pb,o)){
          const other = level.objs.find(q=>q.t==='portal' && q.pid===o.pid && q!==o);
          if(other){
            P.x = other.x + (other.w-P.w)/2;
            P.y = other.y + other.h - P.h;
            teleCool = 30; shake = Math.max(shake,5);
          }
        }
        break;
      case 'fuelcan':
        if(!o.st.taken && overlap(pb,o)){
          o.st.taken = true;
          P.fuel = o.amount || 180;
          toast("Jetpack fueled. Hold JUMP in the air.", false, 1800);
        }
        break;
      case 'walker': {
        if(o.st.squashed) break;
        o.x += o.st.dir * (o.spd||1.4);
        if(o.x < o.a){ o.x = o.a; o.st.dir = 1; }
        if(o.x + o.w > o.b){ o.x = o.b - o.w; o.st.dir = -1; }
        if(overlap(pb,o)){
          if(P.vy > 0 && (P.y+P.h) < o.y + 14){
            o.st.squashed = true;
            P.vy = -7.5; shake = Math.max(shake,5);
            toast(rnd(["Squish.","Problem stepped on.","It had a troll family."]), false, 1200);
          } else die("Goomba'd.");
        }
        break;
      }
      case 'timegate':
        if(isSolid(o) && overlap(pb,o)) die("Squished by bureaucracy.");
        break;
      case 'check':
        if(!o.st.lit && overlap(pb,o)){
          o.st.lit = true;
          level.checkpoint = {x:o.x-20, y:440};
          toast("Checkpoint. A real one, even.", false, 1600);
        }
        break;
      case 'fakecheck':
        if(!o.st.lit && overlap(pb,o)){
          o.st.lit = true;
          toast("Checkpoint saved! ...just kidding.", true, 1800);
        }
        break;
      case 'boss': {
        const s = o.st;
        if(s.deadB) break;
        if(s.hurtT > 0) s.hurtT--;
        const wasAir = s.by < 500 - 56 - 1;
        s.bvy += 0.5;
        s.by += s.bvy;
        s.bx += s.bvx;
        const gy = 500 - 56;
        if(s.by >= gy){
          s.by = gy; s.bvy = 0; s.bvx = 0;
          if(wasAir){
            // landing impact
            shake = Math.max(shake, s.slam ? 12 : 6);
            sfx(120, 45, 0.18, "triangle", 0.11);
            for(let i=0;i<6;i++) particles.push({
              x:s.bx+30+(Math.random()-0.5)*50, y:gy+54,
              vx:(Math.random()-0.5)*3, vy:-Math.random()*2,
              life:14+Math.random()*10, c:"rgba(200,190,230,0.7)", s:3
            });
            // phase 2+: landings send out ground shockwaves
            if(s.hp <= (o.hp||3) * 0.67){
              const spd2 = s.slam ? 5.6 : 4.2;
              const h2 = s.slam ? 22 : 14;
              waves.push({x:s.bx+8,  dir:-1, spd:spd2, h:h2, life:90});
              waves.push({x:s.bx+52, dir: 1, spd:spd2, h:h2, life:90});
            }
            s.slam = false;
          }
          if(s.crouch > 0){
            // telegraphing the slam — crown gleams, body coils
            s.crouch--;
            if(s.crouch === 0){
              s.slam = true;
              s.bvy = -15;
              s.bvx = (P.x + P.w/2 > s.bx + 30 ? 1 : -1) * 3.4;
              sfx(140, 60, 0.35, "sawtooth", 0.12);   // roar
            }
          } else if(s.rest > 0){
            s.rest--;
          } else {
            const mhp = o.hp || 3;
            s.rest = Math.max(14, 46 - Math.round((mhp - s.hp) / mhp * 26));
            // phase 3 (1 hp left): every other attack is the big slam
            if(s.hp <= (o.hp||3) * 0.34 && !s.lastWasSlam){
              s.crouch = 34;
              s.lastWasSlam = true;
            } else {
              s.lastWasSlam = false;
              s.bvy = -9.5;
              s.bvx = (P.x + P.w/2 > s.bx + 30 ? 1 : -1) * (2.4 + ((o.hp||3) - s.hp) / (o.hp||3) * 2.2);
            }
          }
        } else if(s.slam){
          // slam drifts toward you mid-air — commit to a direction
          s.bvx += (P.x + P.w/2 > s.bx + 30 ? 0.09 : -0.09);
        }
        s.bx = clamp(s.bx, 20, W - 80);
        const br = {x:s.bx, y:s.by, w:60, h:56};
        if(overlap(pb, br)){
          const stomp = P.vy > 0 && (P.y + P.h) < s.by + 20;
          if(stomp && s.hurtT <= 0){
            s.hp--; s.hurtT = 70;
            P.vy = -9.5; shake = 10;
            sfx(500, 150, 0.2, "square", 0.1);
            if(s.hp <= 0){
              slayBoss(o);
            } else {
              sfx(140, 60, 0.3, "sawtooth", 0.11);   // wounded roar
              toast(rnd(["Ow. RUDE.","The crown STAYS.","You dare?!","Feel my SHOCKWAVES.","Time to get SERIOUS."]), true, 1500);
            }
          } else if(s.hurtT <= 0){
            die("Royally flattened.");
          }
        }
        break;
      }
      case 'pulsespike': {
        const armed = !o.ch || (level.chan && level.chan[o.ch]);
        if(armed && pulseActive(o) && overlap(pb,o)) die("Off-beat. Fatally.");
        break;
      }
      case 'turret':
        if((gframe + (o.phase||0)) % o.interval === 0){
          bullets.push({x: o.dir>0 ? o.x+o.w : o.x-12, y: o.y + o.h/2 - 3, vx: o.dir*5});
        }
        break;
      case 'laser': {
        const ang = gframe * o.spd + (o.phase||0);
        for(let s=0;s<=12;s++){
          const lx = o.x + Math.cos(ang)*o.len*s/12;
          const ly = o.y + Math.sin(ang)*o.len*s/12;
          if(lx>P.x && lx<P.x+P.w && ly>P.y && ly<P.y+P.h){ die("Lasered. Very 80s."); break; }
        }
        break;
      }
      case 'chaser': {
        const s = o.st;
        if(s.grace > 0){ s.grace--; break; }
        const dx = (P.x+P.w/2) - s.cx, dy = (P.y+P.h/2) - s.cy;
        const d = Math.hypot(dx,dy) || 1;
        s.mt++;
        if(s.mode === 'drift'){
          s.cx += dx/d * o.spd * 0.85;
          s.cy += dy/d * o.spd * 0.85;
          if(s.mt > 110 && d < 340){ s.mode = 'wind'; s.mt = 0; }
        } else if(s.mode === 'wind'){
          // locked in place, vibrating — your dodge window is NOW
          s.cx += (Math.random()-0.5)*2;
          s.cy += (Math.random()-0.5)*2;
          if(s.mt === 26){ // aim locks slightly before launch
            s.dvx = dx/d * o.spd * 3.3;
            s.dvy = dy/d * o.spd * 3.3;
          }
          if(s.mt > 32){ s.mode = 'dash'; s.mt = 0; sfx(700, 180, 0.22, "sawtooth", 0.08); }
        } else { // dash — straight line, committed
          s.cx += s.dvx;
          s.cy += s.dvy;
          if(gframe % 3 === 0){
            s.trail.push({x:s.cx, y:s.cy, a:0.5});
            if(s.trail.length > 6) s.trail.shift();
          }
          s.cx = clamp(s.cx, 10, W-10);
          s.cy = clamp(s.cy, 10, H-10);
          if(s.mt > 36){ s.mode = 'drift'; s.mt = -20; } // brief recovery drift
        }
        for(const t of s.trail) t.a *= 0.9;
        // proximity heartbeat — faster as it closes in
        if(d < 220 && gframe % Math.max(9, Math.floor(d/14)) === 0){
          sfx(160 + (220-d), 140, 0.05, "square", 0.03);
        }
        if(d < (s.mode==='dash' ? 27 : 24)) die("Tagged. It ALWAYS wins tag.");
        break;
      }
      case 'key': {
        if(o.st.held) break;
        const kc = o.st.kx + 10, pc = P.x + P.w/2;
        if(Math.abs(pc - kc) < 140){
          o.st.kx += (pc > kc ? -3 : 3);
          o.st.kx = clamp(o.st.kx, o.x1, o.x2);
        }
        if(overlap(pb, {x:o.st.kx, y:o.y, w:20, h:20})){
          o.st.held = true;
          for(const d2 of level.objs) if(d2.t==='door') d2.st.open = true;
          toast("Key caught. The door sighs and gives up.", false, 2000);
          shake = Math.max(shake,5);
        }
        break;
      }
      case 'shrink':
        if(overlap(pb,o) && P.size!=='small'){
          setSize('small');
          toast("Fun-size mode. Jump included (smaller).", true, 1500);
        }
        break;
      case 'grow':
        if(overlap(pb,o) && P.size!=='normal'){
          setSize('normal');
          toast("Back to full price.", false, 1200);
        }
        break;
      case 'tele':
        if(teleCool<=0 && overlap(pb,o)){
          P.x = o.to.x; P.y = o.to.y; P.vx = 0; P.vy = 0;
          teleCool = 25; shake = Math.max(shake,8);
          toast(o.msg || "Whoosh.", true, 1400);
        }
        break;
      case 'flag':
        if(overlap(pb,o)){
          if(flagHopCount < o.hops.length){
            const hop = o.hops[flagHopCount++];
            o.x = hop.x; o.y = hop.y;
            shake = Math.max(shake,6);
            toast(rnd(["Nope. Over here now.","The flag has trust issues too.","Catch me if you can."]), true, 1400);
          } else {
            if(levelIdx < LEVELS.length-1){
              unlockedMax = Math.max(unlockedMax, levelIdx+1);
              saveProgress();
              toast("Level cleared & saved. The troll is mildly annoyed.", false, 1800);
              loadLevel(levelIdx+1);
            } else {
              win();
            }
          }
        }
        break;
    }
  }

  updateHazards(pb);
}

function slayBoss(o){
  const s = o.st;
  s.deadB = true;
  for(const d2 of level.objs) if(d2.t==='door') d2.st.open = true;
  toast("The king has fallen. The cage opens.", false, 2500);
  sfx(400, 40, 0.6, "sawtooth", 0.12);
  for(let i=0;i<3;i++) particles.push({
    x:s.bx+16+i*16, y:s.by-8,
    vx:(Math.random()-0.5)*6, vy:-7-Math.random()*3,
    life:80, c:"#ffd23f", s:7
  });
  for(let i=0;i<40;i++) particles.push({
    x:s.bx+30, y:s.by+28,
    vx:(Math.random()-0.5)*10, vy:(Math.random()-0.9)*10,
    life:50+Math.random()*30, c:rnd(["#7cff4f","#ffd23f","#ff3d6e"]), s:4+Math.random()*4
  });
}

function updateHazards(pb){
  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    b.x += b.vx;
    if(b.x < -30 || b.x > W+30){ bullets.splice(i,1); continue; }
    if(overlap({x:b.x, y:b.y, w:12, h:6}, pb)){ bullets.splice(i,1); die("Ventilated."); }
  }
  // boss shockwaves
  for(let i=waves.length-1;i>=0;i--){
    const wv = waves[i];
    wv.x += wv.dir * wv.spd;
    wv.life--;
    if(wv.life <= 0 || wv.x < -20 || wv.x > W+20){ waves.splice(i,1); continue; }
    if(overlap({x:wv.x, y:500-wv.h, w:18, h:wv.h}, pb)){
      waves.splice(i,1);
      die("Wave checked. Fatally.");
    }
  }

  // boomerang flight
  if(brng){
    const b = brng;
    b.t++;
    if(b.state === 'out'){
      b.x += b.vx;                       // constant speed, ~340px range
      if(b.t > 36 || b.x < 6 || b.x > W-6) b.state = 'back';
    } else {
      const dx = (P.x+P.w/2) - b.x, dy = (P.y+P.h/2) - b.y;
      const d = Math.hypot(dx,dy) || 1;
      const sp = Math.min(11, 3.5 + b.t * 0.06);
      b.x += dx/d * sp;
      b.y += dy/d * sp;
      if(d < 20){ brng = null; sfx(700, 1000, 0.06, "square", 0.05); }
    }
    if(brng && !b.hit){
      for(const o of level.objs){
        if(o.t !== 'boss' || o.st.deadB) continue;
        const s = o.st;
        if(s.hurtT <= 0 && overlap({x:b.x-10, y:b.y-6, w:20, h:12}, {x:s.bx, y:s.by, w:60, h:56})){
          b.hit = true;
          b.state = 'back';
          s.hp = Math.floor(s.hp / 2);
          s.hurtT = 50;
          shake = Math.max(shake, 8);
          sfx(900, 300, 0.18, "square", 0.1);
          if(s.hp <= 0) slayBoss(o);
          else toast(rnd(["HALVED. He felt that.","Boomerang math is brutal.","The crown wobbles."]), false, 1300);
        }
      }
    }
  }

  // echo ghost — your previous life, replayed and lethal
  if(level.echo && !P.dead){
    echoRec.push({x:P.x, y:P.y});
    if(echoRec.length > 1800) echoRec.shift();
    if(echoPath && echoT < echoPath.length){
      const e = echoPath[echoT];
      echoT++;
      if(overlap({x:e.x+4, y:e.y+4, w:P.w-8, h:P.h-8}, pb)){
        die("Killed by your past self. Poetic.");
      }
    }
  }

  // mirror twin
  if(level.twin && !P.dead){
    const tw = {x: W - P.x - P.w, y: P.y, w: P.w, h: P.h};
    for(const o of level.objs){
      if(o.t==='spikes' && overlap(tw,o)){ die("Your twin found the spikes. Typical."); break; }
    }
  }
}

function isSolid(o){
  if(o.t==='solid'||o.t==='ice'||o.t==='bounce'||o.t==='dodge'||o.t==='conveyor'||o.t==='glue'||o.t==='mover') return true;
  if(o.t==='phaseA') return phaseOnNow();
  if(o.t==='phaseB') return !phaseOnNow();
  if(o.t==='decay') return levelTime < o.fuse;
  if(o.t==='timegate') return (levelTime % (o.open*2)) >= o.open;
  if(o.t==='fakeoneway'||o.t==='rubber'||o.t==='orbiter') return true;
  if(o.t==='gatewall'){
    const on = !!(level.chan && level.chan[o.ch]);
    return o.invert ? on : !on;
  }
  if(o.t==='door') return !o.st.open;
  if(o.t==='toggleA') return toggleOn;
  if(o.t==='toggleB') return !toggleOn;
  if(o.t==='crumble') return !o.st.gone;
  if(o.t==='ghost') return true; // solid even while invisible — that's the point
  return false;
}
function solidRect(o){ return o; }
function revealGhost(o){
  o.st.seen = true;
  shake = Math.max(shake,6);
  toast("Invisible block. Obviously.", true, 1400);
}

// ---------- rendering ----------
function px(x){ return Math.round(x); }

function drawPlayer(){
  // invisible level: completely gone unless mid-flash (jump/respawn)
  if(level.invis && !P.dead && P.flash <= 0) return;
  const x = px(P.x), y = px(P.y);
  ctx.save();
  if(P.dead){
    ctx.globalAlpha = Math.max(0, 1 - P.deadT/30);
  } else if(level.invis){
    ctx.globalAlpha = Math.min(1, P.flash/8);
  }
  // squash & stretch, anchored at the feet
  const sw = P.w * P.sx, sh = P.h * P.sy;
  const dx = x + (P.w - sw)/2;
  const dy = P.gravDir===1 ? y + (P.h - sh) : y;
  // body
  ctx.fillStyle = "#5fd7ff";
  ctx.fillRect(dx, dy, sw, sh);
  ctx.fillStyle = "#2aa9d6";
  ctx.fillRect(dx, P.gravDir===1 ? dy+sh-6 : dy, sw, 6);
  // eyes (flip with gravity, blink occasionally)
  const blink = (frame % 200) < 5;
  const eyeH = blink ? 2 : 6 * Math.min(1, P.sy);
  const eyeY = P.gravDir===1 ? dy + 7*P.sy : dy + sh - 13*P.sy;
  ctx.fillStyle = "#0b0820";
  const off = (P.face===1 ? 5 : -1) * P.sx;
  ctx.fillRect(dx + 8*P.sx + off, eyeY, 4, eyeH);
  ctx.fillRect(dx + 15*P.sx + off, eyeY, 4, eyeH);
  ctx.restore();
}

function drawSpikeRow(x,y,w,h,up=true,color="#ff3d6e"){
  ctx.fillStyle = color;
  const n = Math.max(1, Math.floor(w/14));
  const sw = w/n;
  for(let i=0;i<n;i++){
    ctx.beginPath();
    if(up){
      ctx.moveTo(x+i*sw, y+h);
      ctx.lineTo(x+i*sw+sw/2, y);
      ctx.lineTo(x+(i+1)*sw, y+h);
    } else {
      ctx.moveTo(x+i*sw, y);
      ctx.lineTo(x+i*sw+sw/2, y+h);
      ctx.lineTo(x+(i+1)*sw, y);
    }
    ctx.closePath(); ctx.fill();
  }
}

function drawFlag(o, fake=false){
  const x=px(o.x), y=px(o.y);
  drawGlow(x+13, y+12, 56, "#7cff4f", 0.35);
  ctx.fillStyle = "#cfc8ff";
  ctx.fillRect(x+2, y, 5, o.h);
  const w1 = Math.sin(frame*0.16)*3, w2 = Math.sin(frame*0.16+1.2)*2;
  ctx.fillStyle = "#7cff4f";
  ctx.beginPath();
  ctx.moveTo(x+7, y+2);
  ctx.quadraticCurveTo(x+18, y+6+w2, x+29+w1, y+10);
  ctx.quadraticCurveTo(x+18, y+14+w2, x+7, y+18);
  ctx.closePath(); ctx.fill();
}

function drawPlat(o){
  const th = level.theme || THEMES.violet;
  ctx.fillStyle = th.plat;
  ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
  ctx.fillStyle = th.platTop;
  ctx.fillRect(px(o.x),px(o.y),o.w,4);
  if(o.h > 12){
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.fillRect(px(o.x), px(o.y)+o.h-5, o.w, 5);
  }
  ctx.fillStyle = "rgba(255,255,255,0.07)";
  for(let sx2 = o.x+12; sx2 < o.x+o.w-8; sx2 += 28){
    ctx.fillRect(sx2, o.y+8, 5, 3);
  }
}

function drawObj(o){
  switch(o.t){
    case 'solid':
      drawPlat(o);
      break;
    case 'crumble': {
      if(o.st.gone) break;
      const th = level.theme || THEMES.violet;
      ctx.fillStyle = o.st.crumbleT>0 ? "#8a4b2d" : th.plat;
      if(o.st.crumbleT>0 && o.st.crumbleT%4<2) ctx.fillStyle="#b8622f";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = th.platTop;
      ctx.fillRect(px(o.x),px(o.y),o.w,4);
      // hairline cracks so crumble is subtly readable
      ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(o.x+o.w*0.35, o.y+4); ctx.lineTo(o.x+o.w*0.45, o.y+o.h*0.7);
      ctx.moveTo(o.x+o.w*0.7, o.y+4); ctx.lineTo(o.x+o.w*0.62, o.y+o.h*0.55);
      ctx.stroke();
      break;
    }
    case 'fake':
      // looks EXACTLY like solid. that's the joke.
      drawPlat(o);
      break;
    case 'ghost':
      if(o.st.seen){
        ctx.fillStyle = "rgba(124,255,79,0.85)";
        ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
        ctx.strokeStyle = "#7cff4f"; ctx.lineWidth=2;
        ctx.strokeRect(px(o.x)+1,px(o.y)+1,o.w-2,o.h-2);
      }
      break;
    case 'spikes':
      drawSpikeRow(o.x,o.y,o.w,o.h,!o.down);
      break;
    case 'popspike':
      if(o.st.popped && o.st.popY>0){
        drawSpikeRow(o.x, o.y+o.h-o.st.popY, o.w, o.st.popY, true, "#ff3d6e");
      }
      break;
    case 'fallspike':
      drawSpikeRow(o.x, o.st.fy, o.w, o.h, false, "#ff3d6e");
      break;
    case 'flag':
      drawFlag(o);
      break;
    case 'fakeflag':
      if(!o.st.exploded) drawFlag(o, true);
      else drawSpikeRow(o.x-8, o.y+o.h-22, o.w+16, 22, true);
      break;
    case 'sign':
      ctx.fillStyle = "#7a6a3a";
      ctx.fillRect(px(o.x)+2, px(o.y)+20, 6, o.h-20);
      ctx.fillStyle = "#c8b060";
      ctx.fillRect(px(o.x)-26, px(o.y), 62, 22);
      ctx.fillStyle = "#3a2a10";
      ctx.font = "bold 16px monospace";
      ctx.fillText("?", px(o.x)+2, px(o.y)+16);
      break;
    case 'gravzone':
      ctx.fillStyle = "rgba(95,215,255,0.08)";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.strokeStyle = "rgba(95,215,255,0.35)";
      ctx.setLineDash([6,6]);
      ctx.strokeRect(px(o.x)+1,px(o.y)+1,o.w-2,o.h-2);
      ctx.setLineDash([]);
      break;
    case 'revzone':
      // completely invisible. hehehe.
      break;
    case 'ice':
      ctx.fillStyle = "#274a6e";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#9fd8ff";
      ctx.fillRect(px(o.x),px(o.y),o.w,5);
      break;
    case 'bounce':
      ctx.fillStyle = "#ffd23f";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#8a5f06";
      ctx.beginPath();
      ctx.moveTo(o.x+o.w/2-10, o.y+o.h-4);
      ctx.lineTo(o.x+o.w/2,    o.y+3);
      ctx.lineTo(o.x+o.w/2+10, o.y+o.h-4);
      ctx.closePath(); ctx.fill();
      break;
    case 'dodge':
      // looks exactly like a normal platform. that's the point.
      drawPlat(o);
      break;
    case 'fakespikes':
      drawSpikeRow(o.x,o.y,o.w,o.h,true, o.st.revealed ? "#5f7a5f" : "#ff3d6e");
      break;
    case 'saw': {
      const cx = o.x+o.w/2, cy = o.y+o.h/2, r = o.w/2;
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(frame*0.25*o.st.dir);
      ctx.fillStyle = "#b8b8cc";
      for(let i=0;i<8;i++){
        ctx.rotate(Math.PI/4);
        ctx.beginPath();
        ctx.moveTo(r-3,-5); ctx.lineTo(r+6,0); ctx.lineTo(r-3,5);
        ctx.closePath(); ctx.fill();
      }
      ctx.beginPath(); ctx.arc(0,0,r-2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#55556a";
      ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
      ctx.restore();
      break;
    }
    case 'wind': {
      ctx.fillStyle = o.fx > 0 ? "rgba(140,220,180,0.05)" : "rgba(220,160,140,0.05)";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.strokeStyle = "rgba(200,230,220,0.35)";
      ctx.lineWidth = 2;
      const dir = Math.sign(o.fx);
      for(let s=0;s<7;s++){
        const yy = o.y + 24 + s*(o.h-48)/6;
        let xx = o.x + (((frame*Math.abs(o.fx)*7 + s*57) % o.w) * dir + (dir<0 ? o.w : 0));
        if(dir<0) xx = o.x + o.w - ((frame*Math.abs(o.fx)*7 + s*57) % o.w);
        ctx.beginPath();
        ctx.moveTo(xx, yy);
        ctx.lineTo(xx + 26*dir, yy);
        ctx.lineTo(xx + 18*dir, yy-4);
        ctx.stroke();
      }
      break;
    }
    case 'conveyor': {
      ctx.fillStyle = "#4a3d88";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#241d4d";
      ctx.fillRect(px(o.x),px(o.y),o.w,8);
      ctx.fillStyle = "#ffd23f";
      const off = ((frame * o.cvx) % 26 + 26) % 26;
      for(let xx = o.x - 26 + off; xx < o.x + o.w; xx += 26){
        const cxx = clamp(xx, o.x, o.x+o.w-12);
        if(xx < o.x || xx > o.x+o.w-12) continue;
        ctx.beginPath();
        if(o.cvx > 0){
          ctx.moveTo(cxx, o.y+2); ctx.lineTo(cxx+10, o.y+5); ctx.lineTo(cxx, o.y+8);
        } else {
          ctx.moveTo(cxx+10, o.y+2); ctx.lineTo(cxx, o.y+5); ctx.lineTo(cxx+10, o.y+8);
        }
        ctx.closePath(); ctx.fill();
      }
      break;
    }
    case 'door':
      if(!o.st.open){
        ctx.fillStyle = "#6a4a2a";
        ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
        ctx.fillStyle = "#3a2a10";
        ctx.fillRect(px(o.x)+4,px(o.y)+4,o.w-8,o.h-8);
        ctx.fillStyle = "#ffd23f";
        ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+o.h/2-6, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillRect(px(o.x)+o.w/2-2, o.y+o.h/2-4, 4, 12);
      } else {
        ctx.strokeStyle = "#6a4a2a"; ctx.lineWidth = 2;
        ctx.setLineDash([5,5]);
        ctx.strokeRect(px(o.x)+1,px(o.y)+1,o.w-2,o.h-2);
        ctx.setLineDash([]);
      }
      break;
    case 'key':
      if(!o.st.held){
        drawGlow(o.st.kx+10, o.y+8, 44, "#ffd23f", 0.45);
        const ky = o.y + Math.sin(frame*0.12)*3;
        ctx.fillStyle = "#ffd23f";
        ctx.beginPath(); ctx.arc(o.st.kx+6, ky+7, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#0b0820";
        ctx.beginPath(); ctx.arc(o.st.kx+6, ky+7, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffd23f";
        ctx.fillRect(px(o.st.kx)+10, ky+5, 12, 4);
        ctx.fillRect(px(o.st.kx)+17, ky+9, 3, 5);
        ctx.fillRect(px(o.st.kx)+13, ky+9, 3, 4);
      }
      break;
    case 'chaser': {
      const s = o.st;
      // afterimage trail from dashes
      for(const t of s.trail){
        if(t.a < 0.03) continue;
        ctx.save();
        ctx.globalAlpha = t.a;
        ctx.fillStyle = "#ff3d6e";
        ctx.beginPath(); ctx.arc(t.x, t.y, 14, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
      const wob = s.mode==='wind' ? 0 : Math.sin(frame*0.2)*3;
      const cx = s.cx, cy = s.cy + wob;
      ctx.save();
      if(s.grace > 0) ctx.globalAlpha = 0.35 + 0.3*Math.sin(frame*0.5);
      // windup: flare red-white and swell
      const winding = s.mode==='wind';
      const rr = winding ? 20 + Math.sin(frame*0.9)*4 : (s.mode==='dash' ? 18 : 20);
      if(winding) drawGlow(cx, cy, 90, "#ff3d6e", 0.5);
      ctx.fillStyle = winding && frame%6<3 ? "#ff8aa8" : "#ff3d6e";
      ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#0b0820";
      if(winding){
        // eyes narrow to slits, locked on you
        ctx.fillRect(cx-12, cy-6, 9, 2);
        ctx.fillRect(cx+3,  cy-6, 9, 2);
      } else {
        // pupils track the player
        const dx = (P.x+P.w/2)-cx, dy=(P.y+P.h/2)-cy, dd=Math.hypot(dx,dy)||1;
        const ex = dx/dd*2.5, ey = dy/dd*2;
        ctx.fillRect(cx-11+ex, cy-8+ey, 7, 4);
        ctx.fillRect(cx+4+ex,  cy-8+ey, 7, 4);
      }
      // grin: wider when close
      const d2p = Math.hypot((P.x+P.w/2)-cx, (P.y+P.h/2)-cy);
      const grin = clamp(1.4 - d2p/280, 0.6, 1.3);
      ctx.beginPath(); ctx.arc(cx, cy+3, 11*grin, 0.15*Math.PI, 0.85*Math.PI); ctx.fill();
      ctx.fillStyle = ctx.fillStyle = winding && frame%6<3 ? "#ff8aa8" : "#ff3d6e";
      ctx.beginPath(); ctx.arc(cx, cy+1, 9*grin, 0.15*Math.PI, 0.85*Math.PI); ctx.fill();
      // "!" during windup
      if(winding){
        ctx.fillStyle = "#ffd23f";
        ctx.font = "bold 22px monospace";
        ctx.fillText("!", cx-4, cy-30);
      }
      ctx.restore();
      break;
    }
    case 'toggleA':
    case 'toggleB': {
      const active = (o.t==='toggleA') === toggleOn;
      const col = o.t==='toggleA' ? "#ff9d3f" : "#4fd0ff";
      if(active){
        ctx.fillStyle = col;
        ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
        ctx.fillStyle = "rgba(0,0,0,0.25)";
        ctx.fillRect(px(o.x),px(o.y)+o.h-5,o.w,5);
      } else {
        ctx.strokeStyle = col; ctx.lineWidth = 2;
        ctx.setLineDash([4,4]);
        ctx.strokeRect(px(o.x)+1,px(o.y)+1,o.w-2,o.h-2);
        ctx.setLineDash([]);
      }
      break;
    }
    case 'shrink':
    case 'grow': {
      const isSh = o.t==='shrink';
      ctx.fillStyle = isSh ? "#ff7ab8" : "#7cff4f";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#0b0820";
      const mx = o.x+o.w/2;
      ctx.beginPath();
      if(isSh){ ctx.moveTo(mx-8,o.y+3); ctx.lineTo(mx+8,o.y+3); ctx.lineTo(mx,o.y+o.h-3); }
      else    { ctx.moveTo(mx-8,o.y+o.h-3); ctx.lineTo(mx+8,o.y+o.h-3); ctx.lineTo(mx,o.y+3); }
      ctx.closePath(); ctx.fill();
      break;
    }
    case 'mover': {
      ctx.fillStyle = "#7a5f2a";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#c8a050";
      ctx.fillRect(px(o.x),px(o.y),o.w,4);
      ctx.fillStyle = "#3a2a10";
      ctx.beginPath(); ctx.arc(o.x+8, o.y+o.h/2+2, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(o.x+o.w-8, o.y+o.h/2+2, 2.5, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'pulsespike': {
      const armed = !o.ch || (level.chan && level.chan[o.ch]);
      if(!armed){
        drawSpikeRow(o.x, o.y+o.h-5, o.w, 5, true, "#3a3a50");
        break;
      }
      const act = pulseActive(o);
      const tt = (gframe + (o.phase||0)) % (o.period||100);
      const warn = !act && tt > (o.period||100)/2 + (o.period||100)/2 - 18;
      if(act){
        drawSpikeRow(o.x, o.y, o.w, o.h, true, "#ff3d6e");
      } else {
        drawSpikeRow(o.x, o.y+o.h-6, o.w, 6, true,
          warn && frame%8<4 ? "#ff3d6e" : "#5a4460");
      }
      break;
    }
    case 'glue': {
      ctx.fillStyle = "#3a4d20";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#6a8a30";
      ctx.fillRect(px(o.x),px(o.y),o.w,6);
      ctx.fillStyle = "#6a8a30";
      for(let gx2=o.x+14; gx2<o.x+o.w-8; gx2+=30){
        const drip = 4 + 3*Math.sin(frame*0.05 + gx2);
        ctx.fillRect(gx2, o.y+6, 5, drip);
      }
      break;
    }
    case 'phaseA':
    case 'phaseB': {
      const act = (o.t==='phaseA') === phaseOnNow();
      const col = o.t==='phaseA' ? "#c86bff" : "#5fffc8";
      const cyc = frame % PHASE_PERIOD;
      const remain = act ? (PHASE_PERIOD/2 - (cyc % (PHASE_PERIOD/2))) / (PHASE_PERIOD/2) : 0;
      if(act){
        ctx.fillStyle = col;
        ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fillRect(px(o.x)+3, px(o.y)+o.h-6, (o.w-6)*(1-remain), 3);
      } else {
        ctx.strokeStyle = col; ctx.lineWidth = 2;
        ctx.setLineDash([3,5]);
        ctx.strokeRect(px(o.x)+1,px(o.y)+1,o.w-2,o.h-2);
        ctx.setLineDash([]);
      }
      break;
    }
    case 'turret': {
      ctx.fillStyle = "#55556a";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#8a8aa8";
      const bx = o.dir>0 ? o.x+o.w-4 : o.x-8;
      ctx.fillRect(bx, o.y+o.h/2-3, 12, 6);
      break;
    }
    case 'water': {
      ctx.fillStyle = "rgba(60,130,220,0.22)";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.strokeStyle = "rgba(150,210,255,0.7)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      for(let wx=o.x; wx<=o.x+o.w; wx+=12){
        const wy = o.y + Math.sin(frame*0.06 + wx*0.08)*3;
        wx===o.x ? ctx.moveTo(wx,wy) : ctx.lineTo(wx,wy);
      }
      ctx.stroke();
      break;
    }
    case 'laser': {
      const ang = gframe * o.spd + (o.phase||0);
      const ex = o.x + Math.cos(ang)*o.len;
      const ey = o.y + Math.sin(ang)*o.len;
      ctx.strokeStyle = "rgba(255,61,110,0.35)";
      ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.strokeStyle = "#ff3d6e";
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.fillStyle = "#ffd23f";
      ctx.beginPath(); ctx.arc(o.x,o.y,7,0,Math.PI*2); ctx.fill();
      break;
    }
    case 'decay': {
      if(levelTime >= o.fuse){
        const dt = levelTime - o.fuse;
        if(dt < 14){
          ctx.save();
          ctx.globalAlpha = 1 - dt/14;
          ctx.fillStyle = "#6a4a2a";
          ctx.fillRect(px(o.x), px(o.y + dt*4), o.w, o.h);
          ctx.restore();
        }
        break;
      }
      const soon = o.fuse - levelTime < 45;
      ctx.fillStyle = soon && gframe % 8 < 4 ? "#a8542f" : "#6a4a2a";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#8a6a40";
      ctx.fillRect(px(o.x),px(o.y),o.w,4);
      ctx.strokeStyle = "#3a2a10";
      ctx.beginPath();
      ctx.moveTo(o.x+o.w*0.3, o.y+4); ctx.lineTo(o.x+o.w*0.5, o.y+o.h*0.6);
      ctx.stroke();
      break;
    }
    case 'portal': {
      const col = o.pid===1 ? "#4fd0ff" : "#ff9d3f";
      drawGlow(o.x+o.w/2, o.y+o.h/2, 62, col, 0.4);
      ctx.save();
      ctx.translate(o.x+o.w/2, o.y+o.h/2);
      ctx.strokeStyle = col; ctx.lineWidth = 3;
      for(let r=0;r<3;r++){
        ctx.beginPath();
        ctx.ellipse(0, 0, 6+r*5, 14+r*7, Math.sin(frame*0.05+r)*0.3, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.restore();
      break;
    }
    case 'fuelcan':
      if(!o.st.taken){
        drawGlow(o.x+o.w/2, o.y+o.h/2, 46, "#ff9d3f", 0.4);
        const fy = o.y + Math.sin(frame*0.1)*3;
        ctx.fillStyle = "#ff9d3f";
        ctx.fillRect(px(o.x), fy, o.w, o.h);
        ctx.fillStyle = "#0b0820";
        ctx.font = "bold 13px monospace";
        ctx.fillText("F", px(o.x)+7, fy+17);
        ctx.fillStyle = "#c86b1f";
        ctx.fillRect(px(o.x)+5, fy-5, 8, 5);
      }
      break;
    case 'walker':
      if(!o.st.squashed){
        const wob = Math.sin(frame*0.3)*2;
        ctx.fillStyle = "#c85f2a";
        ctx.fillRect(px(o.x), px(o.y)+2, o.w, o.h-2);
        ctx.fillStyle = "#8a3a15";
        ctx.fillRect(px(o.x)+3+wob, px(o.y)+o.h-4, 8, 4);
        ctx.fillRect(px(o.x)+o.w-11-wob, px(o.y)+o.h-4, 8, 4);
        ctx.fillStyle = "#0b0820";
        const ed = o.st.dir>0 ? 3 : -3;
        ctx.fillRect(px(o.x)+8+ed, px(o.y)+8, 4, 4);
        ctx.fillRect(px(o.x)+18+ed, px(o.y)+8, 4, 4);
        ctx.fillRect(px(o.x)+7, px(o.y)+5, 6, 2);
        ctx.fillRect(px(o.x)+17, px(o.y)+5, 6, 2);
      }
      break;
    case 'timegate': {
      const cyc = levelTime % (o.open*2);
      const openNow = cyc < o.open;
      ctx.fillStyle = "#55556a";
      ctx.fillRect(px(o.x)-6, px(o.y)-14, o.w+12, 14);
      if(openNow){
        const remain = (o.open - cyc) / o.open;
        ctx.fillStyle = "#7cff4f";
        ctx.fillRect(px(o.x)-4, px(o.y)-10, (o.w+8)*remain, 6);
        ctx.strokeStyle = "#8a8aa8"; ctx.lineWidth = 2;
        ctx.setLineDash([4,6]);
        for(let bx2=o.x+6; bx2<o.x+o.w; bx2+=9){
          ctx.beginPath(); ctx.moveTo(bx2, o.y); ctx.lineTo(bx2, o.y+14); ctx.stroke();
        }
        ctx.setLineDash([]);
      } else {
        const remain = ((o.open*2 - cyc)) / o.open;
        ctx.fillStyle = "#ff3d6e";
        ctx.fillRect(px(o.x)-4, px(o.y)-10, (o.w+8)*Math.min(1,remain), 6);
        ctx.fillStyle = "#8a8aa8";
        for(let bx2=o.x+4; bx2<o.x+o.w-2; bx2+=9){
          ctx.fillRect(bx2, px(o.y), 4, o.h);
        }
      }
      break;
    }
    case 'check':
    case 'fakecheck': {
      ctx.fillStyle = "#5a5a70";
      ctx.fillRect(px(o.x)+5, px(o.y)+12, 6, o.h-12);
      ctx.fillStyle = o.st.lit ? "#7cff4f" : "#3a3a50";
      ctx.beginPath(); ctx.arc(o.x+8, o.y+8, 8, 0, Math.PI*2); ctx.fill();
      if(o.st.lit && frame%30<15){
        ctx.strokeStyle = "#7cff4f"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(o.x+8, o.y+8, 12, 0, Math.PI*2); ctx.stroke();
      }
      break;
    }
    case 'boss': {
      const s = o.st;
      if(s.deadB) break;
      // boss HP bar, top center
      ctx.save();
      ctx.textAlign = "center";
      ctx.fillStyle = "rgba(13,10,26,0.8)";
      ctx.fillRect(W/2-140, 34, 280, 34);
      ctx.strokeStyle = "#ffd23f"; ctx.lineWidth = 2;
      ctx.strokeRect(W/2-140, 34, 280, 34);
      ctx.fillStyle = "#ffd23f";
      ctx.font = "bold 12px monospace";
      ctx.fillText("👑 " + (o.title || "THE TROLL KING") + "  " + s.hp + "/" + (o.hp||3), W/2, 47);
      ctx.fillStyle = "#2a2450";
      ctx.fillRect(W/2-130, 52, 260, 10);
      ctx.fillStyle = "#ff3d6e";
      ctx.fillRect(W/2-130, 52, 260 * (s.hp/(o.hp||3)), 10);
      ctx.textAlign = "left";
      ctx.restore();

      const crouching = s.crouch > 0;
      const bx = s.bx, by = s.by + (crouching ? 8 : 0);
      if(crouching && gframe % 6 < 3) drawGlow(bx+30, by+30, 110, "#ffd23f", 0.5);
      if(s.slam) drawGlow(bx+30, by+30, 90, "#ff3d6e", 0.4);
      ctx.save();
      if(s.hurtT > 0 && gframe % 6 < 3) ctx.globalAlpha = 0.4;
      // crown
      ctx.fillStyle = "#ffd23f";
      for(let c=0;c<3;c++){
        ctx.beginPath();
        ctx.moveTo(bx+8+c*16, by+2);
        ctx.lineTo(bx+16+c*16, by-14);
        ctx.lineTo(bx+24+c*16, by+2);
        ctx.closePath(); ctx.fill();
      }
      // face
      ctx.fillStyle = "#7cff4f";
      ctx.beginPath(); ctx.arc(bx+30, by+30, 28, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#0b0820";
      ctx.fillRect(bx+13, by+20, 12, 4);
      ctx.fillRect(bx+35, by+20, 12, 4);
      ctx.beginPath(); ctx.arc(bx+30, by+36, 14, 0.15*Math.PI, 0.85*Math.PI); ctx.fill();
      ctx.fillStyle = "#7cff4f";
      ctx.beginPath(); ctx.arc(bx+30, by+33, 12, 0.15*Math.PI, 0.85*Math.PI); ctx.fill();
      ctx.restore();
      break;
    }
    case 'magnet': {
      const pul = 1 + Math.sin(frame*0.1)*0.15;
      drawGlow(o.x, o.y, 80*pul, "#c86bff", 0.4);
      ctx.strokeStyle = "rgba(200,107,255,0.5)";
      ctx.lineWidth = 2;
      for(let r2=0;r2<3;r2++){
        const rr = (14 + r2*16) * pul + ((frame*0.5) % 16);
        ctx.globalAlpha = 0.5 * (1 - rr/70);
        ctx.beginPath(); ctx.arc(o.x, o.y, rr, 0, Math.PI*2); ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#c86bff";
      ctx.beginPath(); ctx.arc(o.x, o.y, 7, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'button': {
      ctx.fillStyle = "#55556a";
      ctx.fillRect(px(o.x)-4, px(o.y)+o.h-4, o.w+8, 4);
      ctx.fillStyle = o.st.on ? "#7cff4f" : "#ff3d6e";
      const bh = o.st.on ? 4 : o.h;
      ctx.fillRect(px(o.x), px(o.y)+o.h-bh, o.w, bh);
      break;
    }
    case 'gatewall': {
      const solidNow = isSolid(o);
      if(solidNow){
        ctx.fillStyle = "#6a5a2a";
        ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
        ctx.fillStyle = "#8a7a40";
        for(let gy2=o.y+6; gy2<o.y+o.h-4; gy2+=16) ctx.fillRect(px(o.x)+3, gy2, o.w-6, 4);
      } else {
        ctx.strokeStyle = "#6a5a2a"; ctx.lineWidth = 2;
        ctx.setLineDash([5,5]);
        ctx.strokeRect(px(o.x)+1,px(o.y)+1,o.w-2,o.h-2);
        ctx.setLineDash([]);
      }
      break;
    }
    case 'booster': {
      ctx.fillStyle = "#2a5a8a";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#5fd7ff";
      const boff = (frame*3) % 22;
      for(let bx2 = o.x - 22 + boff; bx2 < o.x + o.w - 8; bx2 += 22){
        if(bx2 < o.x) continue;
        ctx.beginPath();
        ctx.moveTo(bx2, o.y+2); ctx.lineTo(bx2+9, o.y+o.h/2); ctx.lineTo(bx2, o.y+o.h-2);
        ctx.closePath(); ctx.fill();
      }
      break;
    }
    case 'bomb': {
      const s = o.st;
      if(s.doneB) break;
      if(s.boom > 0){
        ctx.save();
        ctx.globalAlpha = s.boom/12;
        ctx.fillStyle = frame%4<2 ? "#ffd23f" : "#ff9d3f";
        ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+o.h/2, o.r*(1 - s.boom/14), 0, Math.PI*2); ctx.fill();
        ctx.restore();
        break;
      }
      const lit = s.fuse > 0;
      const panic = lit && s.fuse < 40;
      ctx.fillStyle = panic && frame%6<3 ? "#8a2020" : "#20202e";
      ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+o.h/2+3, 12, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#55556a"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(o.x+o.w/2+4, o.y+2); ctx.lineTo(o.x+o.w/2+10, o.y-6); ctx.stroke();
      if(lit){
        ctx.fillStyle = frame%4<2 ? "#ffd23f" : "#ff9d3f";
        ctx.beginPath(); ctx.arc(o.x+o.w/2+10, o.y-6, 4, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'oneway':
    case 'fakeoneway': {
      ctx.fillStyle = "#4a6a3a";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.fillStyle = "#7aa860";
      for(let ax2=o.x+10; ax2<o.x+o.w-10; ax2+=30){
        ctx.beginPath();
        ctx.moveTo(ax2, o.y+o.h-2); ctx.lineTo(ax2+6, o.y+2); ctx.lineTo(ax2+12, o.y+o.h-2);
        ctx.closePath(); ctx.fill();
      }
      break;
    }
    case 'orbiter': {
      ctx.strokeStyle = "rgba(232,228,255,0.10)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(o.ox, o.oy, o.orad, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = "rgba(232,228,255,0.18)";
      ctx.beginPath(); ctx.moveTo(o.ox, o.oy); ctx.lineTo(o.x+o.w/2, o.y+o.h/2); ctx.stroke();
      ctx.fillStyle = "#8a83b8";
      ctx.beginPath(); ctx.arc(o.ox, o.oy, 4, 0, Math.PI*2); ctx.fill();
      drawPlat(o);
      break;
    }
    case 'lantern': {
      drawGlow(o.x, o.y, 120, "#ffd88a", 0.55, true);
      const sway = Math.sin(frame*0.07)*4;
      ctx.fillStyle = "#8a6a20";
      ctx.fillRect(px(o.x)-2, px(o.y)-16+sway*0.3, 4, 10);
      ctx.fillStyle = "#ffd23f";
      ctx.fillRect(px(o.x)-7, px(o.y)-6+sway*0.3, 14, 16);
      ctx.fillStyle = "#fff3c0";
      ctx.fillRect(px(o.x)-4, px(o.y)-3+sway*0.3, 8, 10);
      break;
    }
    case 'rubber': {
      const sq = 1 + Math.sin(frame*0.2)*0.02;
      ctx.fillStyle = "#c84a8a";
      ctx.fillRect(px(o.x), px(o.y), o.w*sq, o.h);
      ctx.fillStyle = "#ff7ab8";
      ctx.fillRect(px(o.x)+2, px(o.y)+2, 4, o.h-4);
      ctx.fillRect(px(o.x)+o.w-6, px(o.y)+2, 4, o.h-4);
      break;
    }
    case 'tele': {
      drawGlow(o.x+o.w/2, o.y+o.h/2, 50, "#b46eff", 0.45);
      ctx.fillStyle = "rgba(180,110,255,0.9)";
      ctx.fillRect(px(o.x),px(o.y),o.w,o.h);
      ctx.strokeStyle = "#e0c0ff"; ctx.lineWidth = 2;
      const tcx = o.x+o.w/2, tcy = o.y+o.h/2;
      const rr = 7 + 4*Math.sin(frame*0.15 + o.x);
      ctx.beginPath(); ctx.arc(tcx,tcy,rr,0,Math.PI*2); ctx.stroke();
      break;
    }
  }
}

// sign hover text
function drawSignHints(){
  ctx.font = "bold 13px monospace";
  for(const o of level.objs){
    if(o.t!=='sign') continue;
    const near = Math.abs((P.x+P.w/2)-(o.x+5)) < 90 && Math.abs((P.y)-(o.y)) < 140;
    if(near){
      const msg = o.msg;
      const tw = ctx.measureText(msg).width;
      const bx = clamp(o.x - tw/2, 6, W-tw-18);
      ctx.fillStyle = "rgba(23,18,48,0.95)";
      ctx.fillRect(bx-6, o.y-34, tw+12, 24);
      ctx.strokeStyle = "#c8b060";
      ctx.strokeRect(bx-6, o.y-34, tw+12, 24);
      ctx.fillStyle = "#ffd23f";
      ctx.fillText(msg, bx, o.y-17);
    }
  }
}

function drawTrollFace(){
  if(trollFace.t<=0) return;
  trollFace.t--;
  const x = W-96, y = 64;
  ctx.save();
  ctx.globalAlpha = Math.min(1, trollFace.t/15);
  // face
  ctx.fillStyle = "#7cff4f";
  ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#0b0820";
  // squinty laughing eyes
  ctx.fillRect(x-16, y-10, 12, 4);
  ctx.fillRect(x+4,  y-10, 12, 4);
  // big grin
  ctx.beginPath(); ctx.arc(x, y+4, 16, 0.15*Math.PI, 0.85*Math.PI); ctx.fill();
  ctx.fillStyle = "#7cff4f";
  ctx.beginPath(); ctx.arc(x, y+1, 14, 0.15*Math.PI, 0.85*Math.PI); ctx.fill();
  // text
  ctx.fillStyle = "#7cff4f";
  ctx.font = "bold 13px monospace";
  const tw = ctx.measureText(trollFace.msg).width;
  ctx.fillText(trollFace.msg, x-tw/2, y+52);
  ctx.restore();
}

  });

function drawLevelSelect(){
  ctx.fillStyle = "rgba(13,10,26,0.92)";
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = "center";
  ctx.fillStyle = "#7cff4f";
  ctx.font = "bold 26px monospace";
  ctx.fillText("LEVEL SELECT", W/2, 52);
  ctx.fillStyle = "#8a83b8";
  ctx.font = "bold 13px monospace";
  ctx.fillText("arrows / d-pad: move · ENTER / Ⓐ: play · Ⓑ: back · X key: wipe save · L/ESC: close", W/2, 78);
  ctx.textAlign = "left";

  const cols = 10, cw = 82, ch = 62, gx0 = (W - cols*cw)/2, gy0 = 100;
  for(let i=0;i<LEVELS.length;i++){
    const cx = gx0 + (i%cols)*cw, cy = gy0 + Math.floor(i/cols)*ch;
    const locked = i > unlockedMax;
    ctx.fillStyle = locked ? "#1a1533" : (i===levelIdx ? "#2a4d1e" : "#251d4d");
    ctx.fillRect(cx+4, cy+4, cw-8, ch-8);
    if(i===selIdx){
      ctx.strokeStyle = "#7cff4f"; ctx.lineWidth = 3;
      ctx.strokeRect(cx+4, cy+4, cw-8, ch-8);
    } else {
      ctx.strokeStyle = "#3a2d78"; ctx.lineWidth = 1;
      ctx.strokeRect(cx+4, cy+4, cw-8, ch-8);
    }
    ctx.fillStyle = locked ? "#4a4470" : "#e8e4ff";
    ctx.font = "bold 18px monospace";
    ctx.textAlign = "center";
    ctx.fillText(locked ? "🔒" : (i+1), cx+cw/2, cy+ch/2+2);
    if(LEVELS[i].dark && !locked){
      ctx.font = "10px monospace";
      ctx.fillText("🌑", cx+cw/2, cy+ch-12);
    }
    ctx.textAlign = "left";
  }
  // selected level name
  if(selIdx <= unlockedMax){
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd23f";
    ctx.font = "bold 15px monospace";
    ctx.fillText((selIdx+1) + ". " + LEVELS[selIdx].name, W/2, H-28);
    ctx.textAlign = "left";
  }
}

function verdict(){
  if(deaths===0) return "impossible. you cheated.";
  if(deaths<30) return "suspiciously good.";
  if(deaths<80) return "respectable suffering.";
  if(deaths<160) return "the troll fed like a king.";
  return "a true masochist. salute.";
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0){
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    shake *= 0.85; if(shake<0.5) shake=0;
  }

  if(level.mirror){
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
  }
  if(level.flipud){
    ctx.translate(0, H);
    ctx.scale(1, -1);
  }

  // parallax backdrop (prerendered — 2 draw calls)
  if(bgFar) ctx.drawImage(bgFar, 0, 0);
  if(bgMid) ctx.drawImage(bgMid, -clamp(P.x*0.12, 0, 250), 0);

  // ambient atmosphere (capped, cheap; skipped in performance mode)
  for(const a of (lowFX ? [] : ambient)){
    a.ph += 0.02;
    if(a.k==="embers"){ a.y -= a.v; a.x += Math.sin(a.ph)*0.4; if(a.y<-5){a.y=H+5;a.x=Math.random()*W;} ctx.fillStyle="rgba(255,140,50,0.5)"; }
    else if(a.k==="snow"){ a.y += a.v*0.7; a.x += Math.sin(a.ph)*0.5; if(a.y>H+5){a.y=-5;a.x=Math.random()*W;} ctx.fillStyle="rgba(220,235,255,0.55)"; }
    else if(a.k==="bubbles"){ a.y -= a.v*0.8; a.x += Math.sin(a.ph)*0.3; if(a.y<-5){a.y=H+5;a.x=Math.random()*W;} ctx.fillStyle="rgba(150,210,255,0.4)"; }
    else if(a.k==="leaves"){ a.x += a.v*1.4; a.y += Math.sin(a.ph)*0.7; if(a.x>W+5){a.x=-5;a.y=Math.random()*H;} ctx.fillStyle="rgba(140,220,120,0.4)"; }
    else { a.y -= a.v*0.25; a.x += Math.sin(a.ph)*0.2; if(a.y<-5){a.y=H+5;a.x=Math.random()*W;} ctx.fillStyle="rgba(180,170,230,0.28)"; }
    ctx.fillRect(a.x, a.y, a.s, a.s);
  }

  for(const o of level.objs) drawObj(o);
  drawSignHints();

  // bullets
  ctx.fillStyle = "#ffd23f";
  for(const b of bullets){
    ctx.beginPath();
    ctx.moveTo(b.x, b.y+3); ctx.lineTo(b.x+6, b.y); ctx.lineTo(b.x+12, b.y+3); ctx.lineTo(b.x+6, b.y+6);
    ctx.closePath(); ctx.fill();
  }

  // boomerang
  if(brng){
    ctx.save();
    ctx.translate(brng.x, brng.y);
    ctx.rotate(frame * 0.45);
    ctx.fillStyle = "#c8a050";
    ctx.fillRect(-11, -3, 22, 6);
    ctx.fillRect(-3, -11, 6, 22);
    ctx.fillStyle = "#8a6a30";
    ctx.fillRect(-3, -3, 6, 6);
    ctx.restore();
  }

  // boss shockwaves
  for(const wv of waves){
    ctx.fillStyle = gframe % 6 < 3 ? "#ffd23f" : "#ff9d3f";
    const n = 3;
    for(let i=0;i<n;i++){
      ctx.beginPath();
      ctx.moveTo(wv.x + i*6, 500);
      ctx.lineTo(wv.x + i*6 + 3, 500 - wv.h*(1 - i*0.22));
      ctx.lineTo(wv.x + i*6 + 6, 500);
      ctx.closePath(); ctx.fill();
    }
  }

  // echo ghost — flickering replay of your last life
  if(level.echo && echoPath && echoT < echoPath.length && !P.dead){
    const e = echoPath[echoT];
    ctx.save();
    ctx.globalAlpha = 0.45 + Math.sin(frame*0.3)*0.12;
    ctx.fillStyle = frame%8<4 ? "#b45fff" : "#ff5f9e";
    ctx.fillRect(px(e.x), px(e.y), P.w, P.h);
    ctx.fillStyle = "#0b0820";
    ctx.fillRect(px(e.x)+8, e.y+9, 4, 4);
    ctx.fillRect(px(e.x)+15, e.y+9, 4, 4);
    ctx.restore();
  }

  // mirror twin
  if(level.twin && !P.dead){
    const tx = W - P.x - P.w;
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = "#ff6a8a";
    ctx.fillRect(px(tx), px(P.y), P.w, P.h);
    ctx.fillStyle = "#0b0820";
    const eo = P.face===1 ? -1 : 5;   // mirrored gaze
    ctx.fillRect(px(tx)+8+eo, P.y+7, 4, 6);
    ctx.fillRect(px(tx)+15+eo, P.y+7, 4, 6);
    ctx.restore();
  }

  if(!P.dead || P.deadT<30) drawPlayer();

  // jetpack fuel gauge
  if(P.fuel > 0){
    ctx.fillStyle = "rgba(23,18,48,0.9)";
    ctx.fillRect(px(P.x)-8, px(P.y)-14, P.w+16, 7);
    ctx.fillStyle = "#ff9d3f";
    ctx.fillRect(px(P.x)-7, px(P.y)-13, (P.w+14)*(P.fuel/200), 5);
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--;
    ctx.globalAlpha = clamp(p.life/40,0,1);
    ctx.fillStyle = p.c;
    ctx.fillRect(p.x,p.y,p.s,p.s);
    ctx.globalAlpha = 1;
    if(p.life<=0 || p.y>H+20) particles.splice(i,1);
  }

  if(level.lava){
    const ly = level.lava.y;
    if(ly < H+20){
      ctx.fillStyle = "#b01f14";
      ctx.beginPath();
      ctx.moveTo(0, H); ctx.lineTo(0, ly);
      for(let xx=0; xx<=W; xx+=24){
        ctx.lineTo(xx, ly + Math.sin(frame*0.08 + xx*0.05)*4);
      }
      ctx.lineTo(W, H);
      ctx.closePath(); ctx.fill();
      // bright molten surface — stroke instead of gradient
      ctx.strokeStyle = "#ff7a30";
      ctx.lineWidth = 6;
      ctx.beginPath();
      for(let xx=0; xx<=W; xx+=24){
        const yy = ly + Math.sin(frame*0.08 + xx*0.05)*4;
        xx===0 ? ctx.moveTo(xx,yy) : ctx.lineTo(xx,yy);
      }
      ctx.stroke();
      ctx.fillStyle = "#ffd23f";
      for(let b=0;b<6;b++){
        const bx = ((b*173 + frame*2) % W);
        ctx.beginPath();
        ctx.arc(bx, ly + 10 + (b%3)*8, 3, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  if(level.dark && !gameWon){
    const lsrc = level.lantern;
    const cx = lsrc ? lsrc.x : P.x+P.w/2;
    const cy = lsrc ? lsrc.y : P.y+P.h/2;
    // torch flicker by scaling a prerendered sprite — zero per-frame gradients
    const k = 1 + Math.sin(frame*0.11)*0.03 + Math.sin(frame*0.37)*0.015;
    const sz = DARK_S * k;
    const sx = cx - sz/2, sy = cy - sz/2;
    ctx.drawImage(darkSprite, sx, sy, sz, sz);
    ctx.fillStyle = "rgba(6,4,16,0.94)";
    if(sx > 0)        ctx.fillRect(0, 0, sx, H);
    if(sx + sz < W)   ctx.fillRect(sx + sz, 0, W - sx - sz, H);
    if(sy > 0)        ctx.fillRect(Math.max(0,sx), 0, Math.min(sz, W-Math.max(0,sx)), sy);
    if(sy + sz < H)   ctx.fillRect(Math.max(0,sx), sy + sz, Math.min(sz, W-Math.max(0,sx)), H - sy - sz);
    // the flag shines through the dark like a lighthouse
    for(const o of level.objs){
      if(o.t==='flag'){
        const pulse = 80 + Math.sin(frame*0.08)*14;
        drawGlow(o.x+o.w/2, o.y+20, pulse, "#7cff4f", 0.5, true);
      }
    }
  }

  // film overlay: scanlines + vignette (one prerendered draw)
  if(fxOverlay && !lowFX) ctx.drawImage(fxOverlay, 0, 0);
  if(redFlash > 0){
    ctx.globalAlpha = (redFlash/12);
    ctx.drawImage(fxRed, 0, 0);
    ctx.globalAlpha = 1;
    redFlash--;
  }

  // level intro banner
  if(bannerT > 0 && !atTitle && !selecting){
    const a = bannerT > 70 ? (95-bannerT)/25 : Math.min(1, bannerT/30);
    ctx.save();
    ctx.globalAlpha = a * 0.95;
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(13,10,26,0.75)";
    ctx.fillRect(W/2-300, 150, 600, 64);
    ctx.fillStyle = level.theme ? level.theme.platTop : "#5a48b8";
    ctx.fillRect(W/2-300, 150, 600, 3);
    ctx.fillRect(W/2-300, 211, 600, 3);
    ctx.fillStyle = "#e8e4ff";
    ctx.font = "bold 26px monospace";
    ctx.fillText(bannerText, W/2, 192);
    ctx.textAlign = "left";
    ctx.restore();
    bannerT--;
  }

  // touch-control hints, fading out over the first ~2.5s of each level
  if(isCoarse && !atTitle && !selecting && !paused && !gameWon && levelTime < 150){
    const a = clamp(1 - levelTime/150, 0, 1) * 0.45;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = "#171230";
    ctx.strokeStyle = "#5a48b8"; ctx.lineWidth = 2;
    ctx.font = "bold 26px monospace";
    // steer zone
    ctx.beginPath(); ctx.arc(W*0.13, H-72, 34, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(W*0.34, H-72, 34, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#e8e4ff";
    ctx.textAlign = "center";
    ctx.fillText("◀", W*0.13, H-63);
    ctx.fillText("▶", W*0.34, H-63);
    // jump zone
    ctx.fillStyle = "#171230";
    ctx.beginPath(); ctx.arc(W*0.80, H-72, 42, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#7cff4f";
    ctx.fillText("⤒", W*0.80, H-66);
    ctx.font = "bold 12px monospace";
    ctx.fillStyle = "#8a83b8";
    ctx.fillText("hold left side: steer", W*0.235, H-24);
    ctx.fillText("hold right side: jump", W*0.80, H-24);
    ctx.textAlign = "left";
    ctx.restore();
  }

  drawTrollFace();
  ctx.restore();

  if(gameWon) drawWin();
  if(selecting) drawLevelSelect();
  if(paused && !selecting && !atTitle) drawPause();
  if(atTitle) drawTitle();
}

// R restarts even after win — full reset to won level
addEventListener("keydown", e=>{
  if(gameWon && e.key.toLowerCase()==="r"){
    gameWon = false;
    loadLevel(levelIdx);
  }
});

let slowFrames = 0, lastFrameT = 0;
function loop(){
  const nowT = performance.now();
  if(lastFrameT){
    const dt = nowT - lastFrameT;
    if(dt > 34) slowFrames++;                    // sustained sub-30fps
    else slowFrames = Math.max(0, slowFrames - 2);
    if(!lowFX && slowFrames > 90){
      lowFX = true;
      toast("Performance mode on — visual extras reduced.", false, 2600);
    }
  }
  lastFrameT = nowT;
  frame++;
  pollGamepad();
  if(!selecting && !paused && !atTitle) step();
  render();
  requestAnimationFrame(loop);
}

function startNewGame(){
  // resets ONLY the death counter — you keep your place in the game
  deaths = 0;
  deathEl.textContent = 0;
  saveProgress();
  atTitle = false;
  loadLevel(clamp(unlockedMax, 0, LEVELS.length-1));
  toast("Death counter reset to zero. It won't stay there.", false, 2600);
}
function startContinue(saved2){
  unlockedMax = clamp(saved2.u || 0, 0, LEVELS.length-1);
  deaths = saved2.d || 0;
  deathEl.textContent = deaths;
  atTitle = false;
  loadLevel(unlockedMax);
  toast("Continuing at level " + (unlockedMax+1) + ". Press L for level select.", false, 2600);
}

// boot: load the first level as a frozen backdrop behind the title
{
  const saved2 = loadProgress();
  if(saved2 && typeof saved2.u === "number") unlockedMax = clamp(saved2.u, 0, LEVELS.length-1);
  loadLevel(0);
  toastEl.className = "";   // suppress the intro toast under the title
}
loop();
</script>
</body>
